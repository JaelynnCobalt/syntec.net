<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --neon: #33ff33; --bg: #050505; --dim: #1a5a1a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; overflow: hidden; }
        #terminal { border: 1px solid var(--neon); padding: 20px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(51, 255, 51, 0.2); position: relative; }
        #output { flex: 1; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; font-size: 0.9rem; }
        #input-line { display: flex; gap: 10px; border-top: 1px solid var(--dim); padding-top: 10px; }
        input { background: transparent; border: none; color: var(--neon); font-family: inherit; outline: none; flex: 1; text-transform: uppercase; }
        .discovered { color: #fff; font-weight: bold; }
        .system { opacity: 0.6; }

        #popup-image { 
            position: absolute; 
            bottom: 60px; 
            right: 20px; 
            width: 200px; 
            border: 2px solid var(--neon); 
            display: none; 
            z-index: 100;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.5);
        }
    </style>
</head>
<body>

<div id="terminal">
    <img id="popup-image" src="https://static.independent.co.uk/2021/03/25/16/newFile-1.jpg?quality=75&width=768&crop=3:2%2Csmart&auto=webp" alt="Discovery">
    
    <div id="output">
[PEGAUS OS v2.1 - CHEMICAL SYNTHESIS SIMULATOR]
AUTHORIZED USER: J13 (INTERN)
--------------------------------------------------
TYPE ELEMENTS TO COMBINE (e.g., WATER + FIRE)
TYPE 'LIST' TO SEE DATABASE.
TYPE 'HELP' FOR PROTOCOL.

AVAILABLE: WATER, FIRE, EARTH, AIR
    </div>
    <div id="input-line">
        <span>></span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('cmd');
    const popupImg = document.getElementById('popup-image');

    const INITIAL_INVENTORY = ["WATER", "FIRE", "EARTH", "AIR"];
    let inventory = [];

    const recipes = {
        "FIRE+EARTH": "LAVA", "LAVA+WATER": "STONE", "WATER+EARTH": "MUD",
        "AIR+FIRE": "ENERGY", "AIR+EARTH": "DUST", "AIR+WATER": "MIST",
        "FIRE+WATER": "STEAM", "ENERGY+EARTH": "QUARTZ", "STEAM+EARTH": "GEYSER",
        "MIST+EARTH": "CLAY", "CLAY+FIRE": "BRICK", "BRICK+BRICK": "BUILDING",
        "ENERGY+WATER": "ELECTROLYTE", "EARTH+ENERGY": "PLANT", "PLANT+EARTH": "TREE", 
        "MIST+PLANT": "GRASS", "TREE+WATER": "FOREST", "FIRE+STONE": "METAL",
        "METAL+FIRE": "STEEL", "STEEL+ENERGY": "KNIFE", "ENERGY+ENERGY": "GOD", 
        "GOD+EARTH": "CREATION", "CREATION+ENERGY": "LIFE", "LIFE+CREATION": "ADAM", 
        "ADAM+CREATION": "EVE", "ADAM+EVE": "GARDEN", "ADAM+ENERGY":"MAN",
        "GARDEN+ENERGY": "SNAKE", "SNAKE+TREE": "SIN", "GOD+EVE": "GOOD", 
        "GOOD+SIN": "MORALITY", "MORALITY+SIN": "CRIME", "FOREST+FIRE": "ARSON", 
        "CRIME+MAN": "CRIMINAL", "CRIMINAL+BUILDING": "PRISON", "MUD+AIR": "DRY SLAB", 
        "TREE+KNIFE": "PAPER", "METAL+AIR": "WIRE", "WIRE+KNIFE": "NEEDLE", 
        "NEEDLE+WATER": "SEWING", "PAPER+SEWING": "BOOK", "BOOK+MORALITY": "LAW", 
        "LAW+MAN": "LAWYER", "GRASS+GRASS": "MEADOW", "MEADOW+GOD": "MEADOWANGEL", 
        "MEADOWANGEL+LAWYER": "GABRIEL SIMPSON", "BULLET+NECK": "CHARLIE KIRK"
    };

    function saveGame() { localStorage.setItem('pegaus_inventory', JSON.stringify(inventory)); }
    
    function loadGame() {
        const saved = localStorage.getItem('pegaus_inventory');
        inventory = saved ? JSON.parse(saved) : [...INITIAL_INVENTORY];
        if (saved) print("RESTORING SESSION... PREVIOUS DATABASE LOADED.", "system");
    }

    function print(text, className = "") {
        const div = document.createElement('div');
        div.className = className;
        div.textContent = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function handleCombination(el1, el2) {
        if (!inventory.includes(el1) || !inventory.includes(el2)) {
            print("ERR: ONE OR MORE ELEMENTS NOT IN DISCOVERED DATABASE.", "system");
            return;
        }
        const result = recipes[`${el1}+${el2}`] || recipes[`${el2}+${el1}`];
        if (result) {
            if (result === "CHARLIE KIRK") popupImg.style.display = 'block';
            if (inventory.includes(result)) {
                print(`RESULT: ${result} (ALREADY DISCOVERED)`);
            } else {
                inventory.push(result);
                saveGame();
                print(`SUCCESS! NEW COMPOUND DISCOVERED: ${result}`, "discovered");
            }
        } else {
            print("REACTION FAILED: NO STABLE COMPOUND FORMED.");
        }
    }

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const raw = input.value.toUpperCase().trim();
            input.value = '';
            print(`> ${raw}`);

            // 1. Handle Commands
            if (raw === 'HELP') {
                print("COMMANDS: LIST, CLEAR, RESET, or [A] + [B]");
            } 
            else if (raw === 'LIST') {
                print("DISCOVERED: " + inventory.join(", "), "discovered");
            }
            else if (raw === 'CLEAR') {
                output.innerHTML = '';
                popupImg.style.display = 'none';
            }
            else if (raw === 'RESET') {
                if(confirm("WIPE DATABASE?")) {
                    inventory = [...INITIAL_INVENTORY];
                    saveGame();
                    print("DATABASE PURGED.", "system");
                }
            }
            // 2. Handle Synthesis (A + B or COMBINE A B)
            else if (raw.includes('+')) {
                const parts = raw.split('+').map(p => p.trim());
                handleCombination(parts[0], parts[1]);
            }
            else if (raw.startsWith('COMBINE ')) {
                const parts = raw.split(' ');
                handleCombination(parts[1], parts[2]);
            }
            else {
                print(`'${raw}' IS NOT A VALID COMMAND OR SYNTHESIS.`);
            }
        }
    });

    loadGame();
</script>
</body>
</html>
