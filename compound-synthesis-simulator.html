<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --neon: #33ff33; --bg: #050505; --dim: #1a5a1a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; overflow: hidden; }
        #terminal { border: 1px solid var(--neon); padding: 20px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(51, 255, 51, 0.2); position: relative; }
        #output { flex: 1; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; font-size: 0.9rem; }
        #input-line { display: flex; gap: 10px; border-top: 1px solid var(--dim); padding-top: 10px; }
        input { background: transparent; border: none; color: var(--neon); font-family: inherit; outline: none; flex: 1; text-transform: uppercase; }
        .discovered { color: #fff; font-weight: bold; }
        .system { opacity: 0.6; }

        /* Style for the popup image */
        #popup-image { 
            position: absolute; 
            bottom: 60px; 
            right: 20px; 
            width: 200px; 
            border: 2px solid var(--neon); 
            display: none; /* Hidden by default */
            z-index: 100;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.5);
        }
    </style>
</head>
<body>

<div id="terminal">
    <img id="popup-image" src="https://static.independent.co.uk/2021/03/25/16/newFile-1.jpg?quality=75&width=768&crop=3:2%2Csmart&auto=webp" alt="Discovery">
    
    <div id="output">
[PEGAUS OS v2.1 - CHEMICAL SYNTHESIS SIMULATOR]
AUTHORIZED USER: J13 (INTERN)
--------------------------------------------------
TYPE 'LIST' TO SEE ELEMENTS.
TYPE 'COMBINE [EL1] [EL2]' TO SYNTHESIZE.
TYPE 'HELP' FOR PROTOCOL.

AVAILABLE: WATER, FIRE, EARTH, AIR
    </div>
    <div id="input-line">
        <span>></span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('cmd');
    const popupImg = document.getElementById('popup-image');

    let inventory = ["WATER", "FIRE", "EARTH", "AIR"];
    
    // Synthesis Recipes
    const recipes = {
        "FIRE+EARTH": "LAVA",
        "LAVA+WATER": "STONE",
        "WATER+EARTH": "MUD",
        "AIR+FIRE": "ENERGY",
        "AIR+EARTH": "DUST",
        "AIR+WATER": "MIST",
        "FIRE+WATER": "STEAM",
        "ENERGY+EARTH": "QUARTZ",
        "STEAM+EARTH": "GEYSER",
        "MIST+EARTH": "CLAY",
        "CLAY+FIRE": "BRICK",
        "BRICK+BRICK": "BUILDING",
        "LAVA+WATER": "OBSIDIAN",
        "ENERGY+WATER": "ELECTROLYTE", 
        "EARTH+ENERGY": "PLANT", 
        "PLANT+EARTH": "TREE", 
        "TREE+WATER": "FOREST", 
        "FIRE+STONE": "METAL",
        "METAL+FIRE": "STEEL", 
        "STEEL+ENERGY": "KNIFE", 
        "ENERGY+ENERGY": "GOD", 
        "GOD+EARTH": "CREATION", 
        "CREATION+ENERGY": "LIFE", 
        "LIFE+CREATION": "ADAM", 
        "ADAM+CREATION": "EVE",
        "ADAM+EVE": "GARDEN",
        "ADAM+ENERGY":"MAN",
        "GARDEN+ENERGY": "SNAKE",
        "SNAKE+TREE": "SIN",
        "GOD+ENERGY": "LIFE", 
        "GOD+EVE": "GOOD", 
        "GOOD+SIN": "MORALITY", 
        "MORALITY+SIN": "CRIME", 
        "FOREST+FIRE": "ARSON", 
        "CRIME+MAN": "CRIMINAL", 
        "CRIMINAL+BUILDING": "PRISON", 
        "FOREST+FIRE": "ARSON", 
        "MUD+AIR": "DRY SLAB", 
        "TREE+KNIFE": "PAPER", 
        "METAL+AIR": "WIRE", 
        "WIRE+KNIFE": "NEEDLE", 
        "NEEDLE+WATER": "SEWING", 
        "PAPER+SEWING": "BOOK", 
        "BOOK+MORALITY": "LAW", 
        "LAW+PERSON": "LAWYER", 
        "GRASS+GRASS": "MEADOW", 
        "MEADOW+LAW+ADAM": "GABRIEL SIMPSON", 
        "BULLET+NECK": "CHARLIE KIRK", 
    };

    function print(text, className = "") {
        const div = document.createElement('div');
        div.className = className;
        div.textContent = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const raw = input.value.toUpperCase().trim();
            const parts = raw.split(' ');
            const cmd = parts[0];
            input.value = '';

            print(`> ${raw}`);

            if (cmd === 'HELP') {
                print("COMMANDS: LIST, COMBINE [A] [B], CLEAR");
            } 
            else if (cmd === 'LIST') {
                print("CURRENT DISCOVERED ELEMENTS:");
                print(inventory.join(", "), "discovered");
            }
            else if (cmd === 'CLEAR') {
                output.innerHTML = '';
                popupImg.style.display = 'none'; // Hide image on clear
            }
            else if (cmd === 'COMBINE') {
                if (parts.length < 3) {
                    print("ERR: INVALID SYNTAX. USE: COMBINE [A] [B]", "system");
                    return;
                }
                let el1 = parts[1];
                let el2 = parts[2];

                if (!inventory.includes(el1) || !inventory.includes(el2)) {
                    print("ERR: ONE OR MORE ELEMENTS NOT IN DISCOVERED DATABASE.", "system");
                } else {
                    const combo1 = `${el1}+${el2}`;
                    const combo2 = `${el2}+${el1}`;
                    const result = recipes[combo1] || recipes[combo2];

                    if (result) {
                        // Check specifically for the triggered result
                        if (result === "CHARLIE KIRK") {
                            popupImg.style.display = 'block';
                        }

                        if (inventory.includes(result)) {
                            print(`RESULT: ${result} (ALREADY DISCOVERED)`);
                        } else {
                            inventory.push(result);
                            print(`SUCCESS! NEW COMPOUND DISCOVERED: ${result}`, "discovered");
                        }
                    } else {
                        print("REACTION FAILED: NO STABLE COMPOUND FORMED.");
                    }
                }
            } else {
                print(`'${cmd}' IS NOT RECOGNIZED AS AN INTERNAL COMMAND.`);
            }
        }
    });
</script>
</body>
</html>
