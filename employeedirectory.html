<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYNTEC TERMINAL - TASK UPLOAD</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 80vh;
            padding: 25px;
            border: 12px solid #2a2a2a;
            border-radius: 35px;
            background: #050505;
            box-shadow: inset 0 0 60px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 10px; margin-bottom: 20px; flex-shrink: 0; }
        
        .stat-bar { display: flex; justify-content: space-between; margin-bottom: 15px; color: #1a551a; font-size: 0.8rem; }
        .stars { color: #33ff33; font-weight: bold; }

        .task-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #1a551a;
            padding: 30px;
            background: rgba(0, 20, 0, 0.2);
        }

        .instruction { color: #1a551a; font-size: 0.8rem; margin-bottom: 5px; }
        #prompt-text { font-size: 1.1rem; margin-bottom: 20px; color: #33ff33; }

        .input-area { display: flex; align-items: center; gap: 10px; }
        #user-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #33ff33;
            color: #33ff33;
            font-family: inherit;
            font-size: 1.2rem;
            width: 100%;
            outline: none;
            text-transform: uppercase;
        }

        /* Progress UI */
        .progress-box { margin-top: 30px; display: none; }
        .progress-bar-container { width: 100%; height: 15px; border: 1px solid #33ff33; margin-top: 10px; }
        .progress-bar-fill { width: 0%; height: 100%; background: #33ff33; }

        #status-msg { margin-top: 10px; font-size: 0.8rem; height: 1.2rem; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>SYNTEC WORKSTATION J13</h1>
        <p>TASK TERMINAL V.2.1 | LEVEL 3 INTERN ACCESS</p>
    </div>

    <div class="stat-bar">
        <span>SECTOR: PEGASUS-04</span>
        <span>CREDIT STARS: <span id="star-count" class="stars">0</span> / 5</span>
    </div>

    <div class="task-container">
        <div id="active-task-ui">
            <p class="instruction">PLEASE TYPE THE FOLLOWING STRING TO COMMENCE FILING:</p>
            <p id="prompt-text">LOADING...</p>
            
            <div class="input-area">
                <span>></span>
                <input type="text" id="user-input" autocomplete="off" autofocus>
            </div>

            <div class="progress-box" id="progress-box">
                <p id="status-msg">UPLOADING TO CENTRAL CORE...</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <p style="font-size: 0.6rem; color: #1a551a; margin-top: 10px;">
        WARNING: IMPROPER DATA ENTRY MAY RESULT IN TERMINAL LOCKOUT.
    </p>
</div>

<script>
    let stars = 0;
    const taskData = [
        { label: "LOG: RADIANCE_VAR_1986", code: "RV-86-4409" },
        { label: "ARCHIVE: STABILIZER_DECAY", code: "STAB-C-DECAY" },
        { label: "FILE: B_COBALT_INTERNAL", code: "COBALT-PR-33" },
        { label: "ENTRY: PEGASUS_BUFFER_CLR", code: "BUFF-CLR-004" },
        { label: "REPORT: LAB_4_TEMP_SYNC", code: "L4-TEMP-LOG-A" },
        { label: "TRANSCRIPTION: W_N_MEMO_9", code: "WN-MEMO-402" },
        { label: "PURGE: EXPIRED_SAMPLES", code: "PURGE-B-99" },
        { label: "RE-INDEX: USER_DIRECTORY", code: "INDEX-J13-SYN" }
    ];

    let currentTask = null;
    const userInput = document.getElementById('user-input');
    const promptText = document.getElementById('prompt-text');
    const progressBox = document.getElementById('progress-box');
    const progressFill = document.getElementById('progress-fill');
    const starCount = document.getElementById('star-count');
    const statusMsg = document.getElementById('status-msg');

    function loadNewTask() {
        currentTask = taskData[Math.floor(Math.random() * taskData.length)];
        promptText.innerText = `${currentTask.label} [${currentTask.code}]`;
        userInput.value = "";
        userInput.disabled = false;
        userInput.focus();
        progressBox.style.display = "none";
        progressFill.style.width = "0%";
    }

    userInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            if (userInput.value.toUpperCase() === currentTask.code) {
                startUpload();
            } else {
                statusMsg.innerText = "ERROR: STRING MISMATCH. RE-ENTRY REQUIRED.";
                userInput.value = "";
            }
        }
    });

    function startUpload() {
        userInput.disabled = true;
        progressBox.style.display = "block";
        statusMsg.innerText = "UPLOADING TO CENTRAL CORE...";
        
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finishTask();
            } else {
                width += 2;
                progressFill.style.width = width + '%';
            }
        }, 40);
    }

    function finishTask() {
        stars++;
        starCount.innerText = stars;
        statusMsg.innerText = "DATA VERIFIED. +1 STAR GRANTED.";

        if (stars >= 5) {
            statusMsg.innerText = "QUOTA MET. ACCESSING COMMISSARY...";
            setTimeout(() => {
                window.location.href = "syntecstore.html";
            }, 2000);
        } else {
            setTimeout(loadNewTask, 1500);
        }
    }

    // Initialize
    window.onload = loadNewTask;
</script>
</body>
</html>
