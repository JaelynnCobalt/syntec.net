<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLINICAL MODULES - J13</title>
    <style>
        body {
            background-color: #000; color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: uppercase; overflow: hidden;
        }
        .crt-monitor {
            position: relative; width: 95vw; max-width: 850px; height: 90vh;
            padding: 25px; border: 15px solid #2a2a2a; border-radius: 40px;
            background: #050505; box-shadow: inset 0 0 80px #000;
            display: flex; flex-direction: column;
        }
        .header { border-bottom: 2px solid #33ff33; padding-bottom: 10px; margin-bottom: 15px; }
        .module-box { border: 1px solid #33ff33; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .menu-btn { 
            background: transparent; color: #33ff33; border: 1px solid #33ff33; 
            padding: 15px; margin: 10px 0; cursor: pointer; text-align: left; font-family: inherit;
        }
        .menu-btn:hover:not(:disabled) { background: #33ff33; color: #000; }
        .menu-btn:disabled { color: #1a551a; border-color: #1a551a; cursor: not-allowed; }
        .patient-file { background: rgba(51, 255, 51, 0.05); padding: 15px; border-left: 4px solid #33ff33; margin-bottom: 20px; }
        input[type="text"] {
            background: transparent; border: none; border-bottom: 2px solid #33ff33;
            color: #33ff33; font-family: inherit; font-size: 1.1rem; width: 100%; outline: none;
        }
        .progress-container { width: 100%; height: 12px; border: 1px solid #33ff33; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #33ff33; }
        .score-board { display: flex; justify-content: space-between; font-size: 0.9rem; color: #1a551a; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1 id="module-title">SYSTEM SELECTION MENU</h1>
        <div class="score-board">
            <span>USER: INTERN_J13</span>
            <span id="progress-text">MODULE PROGRESS: 0 / 10</span>
        </div>
    </div>

    <div id="menu-view" class="module-box">
        <p>SELECT TRAINING TRACK:</p>
        <button class="menu-btn" id="btn-general" onclick="startModule('general')">01. GENERAL MEDICINE [INCOMPLETE]</button>
        <button class="menu-btn" id="btn-psych" onclick="startModule('psychiatry')">02. PSYCHIATRY (CLINICAL REFS) [INCOMPLETE]</button>
        <button class="menu-btn" id="btn-er" onclick="startModule('emergency')">03. EMERGENCY DEPARTMENT [INCOMPLETE]</button>
    </div>

    <div id="work-view" class="module-box hidden">
        <div id="case-display"></div>
        <div class="input-area">
            <p id="prompt-text">TYPE DIAGNOSIS AND PRESS ENTER:</p>
            <input type="text" id="user-input" autocomplete="off">
            <div class="progress-container" id="prog-cont"><div class="progress-bar" id="prog-bar"></div></div>
            <p id="feedback"></p>
        </div>
    </div>
</div>

<script>
    let currentModule = "";
    let score = 0;
    let currentAnswer = "";
    let completedModules = { general: false, psychiatry: false, emergency: false };

    const database = {
        general: [
            { data: "AGE: 45 | SEX: M | SYMPTOMS: PERSISTENT COUGH, CLUBBING OF FINGERS, WEIGHT LOSS.", answer: "LUNG CANCER" },
            { data: "AGE: 30 | SEX: M | BLOOD: WBC 18,000 | SYMPTOMS: RLQ PAIN, REBOUND TENDERNESS.", answer: "APPENDICITIS" },
            { data: "AGE: 60 | SEX: M | BLOOD: FASTING GLUCOSE 240 MG/DL | SYMPTOMS: BLURRED VISION.", answer: "DIABETES MELLITUS" },
            { data: "AGE: 29 | SEX: F | BLOOD: HGB 8.2, FERRITIN 10 | SYMPTOMS: PICA, PALLOR.", answer: "IRON DEFICIENCY ANEMIA" },
            { data: "AGE: 40 | SEX: F | BLOOD: TSH 12.5 (HIGH) | SYMPTOMS: BRADYCARDIA, COLD INTOLERANCE.", answer: "HYPOTHYROIDISM" },
            // Add more to reach 10-20
        ],
        psychiatry: [
            { data: "AGE: 34 | SEX: F | HISTORY: ALTERNATING PERIODS OF MANIC EUPHORIA AND DEEP STUPOR.", answer: "MANIC DEPRESSION" },
            { data: "AGE: 19 | SEX: M | SYMPTOMS: AUDITORY HALLUCINATIONS, FLAT AFFECT, WORD SALAD.", answer: "SCHIZOPHRENIA" },
            { data: "AGE: 25 | SEX: F | SYMPTOMS: RECURRENT PANIC ATTACKS, FEAR OF OPEN SPACES.", answer: "AGORAPHOBIA" },
            { data: "AGE: 40 | SEX: M | SYMPTOMS: OBSESSIVE HAND WASHING, RIGID ADHERENCE TO RULES.", answer: "NEUROSIS" },
            { data: "AGE: 30 | SEX: F | HISTORY: RECENT TRAUMA | SYMPTOMS: AMNESIA, UNEXPLAINED PARALYSIS.", answer: "HYSTERIA" },
        ],
        emergency: [
            { data: "AGE: 50 | SEX: M | SYMPTOMS: CRUSHING CHEST PAIN, JAW PAIN, DIAPHORESIS.", answer: "MYOCARDIAL INFARCTION" },
            { data: "AGE: 5 | SEX: F | SYMPTOMS: STRIDOR, DROOLING, TRIPOD POSITIONING.", answer: "EPIGLOTTITIS" },
            { data: "AGE: 22 | SEX: F | SYMPTOMS: UNILATERAL LEG SWELLING AFTER LONG FLIGHT.", prompt: "ORDER TEST?", answer: "ULTRASOUND" },
            { data: "AGE: 18 | SEX: M | SYMPTOMS: NUCHAL RIGIDITY, PHOTOPHOBIA, PURPURIC RASH.", answer: "MENINGITIS" },
            { data: "AGE: 45 | SEX: M | SYMPTOMS: TRAUMA TO CHEST, TRACHEAL DEVIATION, ABSENT BREATH SOUNDS.", answer: "TENSION PNEUMOTHORAX" },
        ]
    };

    function startModule(mod) {
        currentModule = mod;
        score = 0;
        document.getElementById('menu-view').classList.add('hidden');
        document.getElementById('work-view').classList.remove('hidden');
        document.getElementById('module-title').innerText = "MODULE: " + mod.toUpperCase();
        updateScoreDisplay();
        loadNewCase();
    }

    function loadNewCase() {
        const modCases = database[currentModule];
        const c = modCases[Math.floor(Math.random() * modCases.length)];
        currentAnswer = c.answer;
        document.getElementById('case-display').innerHTML = `<div class="patient-file"><strong>[DATA_FILE]</strong><br><br>${c.data}</div>`;
        document.getElementById('prompt-text').innerText = c.prompt || "TYPE DIAGNOSIS AND PRESS ENTER:";
        const input = document.getElementById('user-input');
        input.value = ""; input.disabled = false; input.focus();
        document.getElementById('feedback').innerText = "";
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const val = this.value.trim().toUpperCase();
            runProgressBar(val === currentAnswer);
        }
    });

    function runProgressBar(isCorrect) {
        document.getElementById('user-input').disabled = true;
        document.getElementById('prog-cont').style.display = "block";
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finalize(isCorrect);
            } else { width += 10; document.getElementById('prog-bar').style.width = width + '%'; }
        }, 50);
    }

    function finalize(isCorrect) {
        document.getElementById('prog-cont').style.display = "none";
        document.getElementById('prog-bar').style.width = "0%";
        if (isCorrect) {
            score++;
            updateScoreDisplay();
            if (score >= 10) {
                completedModules[currentModule] = true;
                checkTotalProgression();
            } else { loadNewCase(); }
        } else {
            document.getElementById('feedback').innerText = "INCORRECT DATA. RE-TRY.";
            document.getElementById('user-input').disabled = false;
            document.getElementById('user-input').focus();
        }
    }

    function updateScoreDisplay() {
        document.getElementById('progress-text').innerText = `MODULE PROGRESS: ${score} / 10`;
    }

    function checkTotalProgression() {
        document.getElementById('btn-' + currentModule.substring(0,5)).innerText = currentModule.toUpperCase() + " [COMPLETE]";
        document.getElementById('btn-' + currentModule.substring(0,5)).disabled = true;

        if (completedModules.general && completedModules.psychiatry && completedModules.emergency) {
            document.getElementById('feedback').innerText = "ALL MODULES VALIDATED. RETURNING TO INDEX...";
            setTimeout(() => window.location.href = "index.html", 3000);
        } else {
            document.getElementById('work-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('module-title').innerText = "SYSTEM SELECTION MENU";
        }
    }
</script>
</body>
</html>
