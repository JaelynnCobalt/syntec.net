<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLINICAL PRACTICE - J13</title>
    <style>
        body {
            background-color: #000; color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: uppercase; overflow: hidden;
        }
        .crt-monitor {
            position: relative; width: 95vw; max-width: 850px; height: 95vh;
            padding: 25px; border: 15px solid #2a2a2a; border-radius: 40px;
            background: #050505; box-shadow: inset 0 0 80px #000;
            display: flex; flex-direction: column;
        }
        .header { border-bottom: 2px solid #33ff33; padding-bottom: 10px; margin-bottom: 15px; }
        .module-box { border: 1px solid #33ff33; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .menu-btn { 
            background: transparent; color: #33ff33; border: 1px solid #33ff33; 
            padding: 15px; margin: 10px 0; cursor: pointer; text-align: left; font-family: inherit;
        }
        .menu-btn:hover:not(:disabled) { background: #33ff33; color: #000; }
        .menu-btn:disabled { color: #1a551a; border-color: #1a551a; cursor: not-allowed; opacity: 0.6; }
        
        /* The "Scribble" File look */
        .patient-file { background: rgba(51, 255, 51, 0.05); padding: 15px; border-left: 4px solid #33ff33; margin-bottom: 20px; line-height: 1.6; font-size: 0.9rem; border-style: dashed;}
        .scribble-title { color: #fff; text-decoration: underline; margin-bottom: 10px; display: block; }
        
        input[type="text"], textarea {
            background: rgba(51, 255, 51, 0.1); border: 1px solid #33ff33;
            color: #33ff33; font-family: inherit; font-size: 1rem; width: 100%; outline: none; padding: 10px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; text-transform: uppercase; }

        .progress-container { width: 100%; height: 12px; border: 1px solid #33ff33; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #33ff33; }
        .score-board { display: flex; justify-content: space-between; font-size: 0.9rem; color: #1a551a; }
        .hint-btn, .submit-btn { 
            background: #1a551a; color: #33ff33; border: none; padding: 10px; 
            margin-top: 10px; cursor: pointer; font-family: inherit;
        }
        .submit-btn { background: #33ff33; color: #000; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1 id="module-title">SYSTEM SELECTION MENU</h1>
        <div class="score-board">
            <span>USER: INTERN_J13</span>
            <span id="progress-text">MODULE PROGRESS: 0 / 10</span>
        </div>
    </div>

    <div id="menu-view" class="module-box">
        <p>SELECT TRAINING TRACK:</p>
        <button class="menu-btn" id="btn-general" onclick="startModule('general')">01. GENERAL MEDICINE</button>
        <button class="menu-btn" id="btn-psychiatry" onclick="startModule('psychiatry')">02. PSYCHIATRY</button>
        <button class="menu-btn" id="btn-emergency" onclick="startModule('emergency')">03. EMERGENCY DEPARTMENT</button>
        <button class="menu-btn" id="btn-charting" onclick="startModule('charting')">04. CHARTING & OBSERVATIONS</button>
    </div>

    <div id="work-view" class="module-box hidden">
        <div id="case-display"></div>
        <div class="input-area" id="input-container"></div>
        <div class="progress-container" id="prog-cont"><div class="progress-bar" id="prog-bar"></div></div>
        <p id="feedback"></p>
    </div>
</div>

<script>
    let currentModule = "";
    let score = 0;
    let currentKeywords = []; 
    let currentAnswer = "";
    let currentHint = "";
    let completedModules = { general: false, psychiatry: false, emergency: false, charting: false };
    const CHEAT_CODE = "SYNTEC_OVERRIDE";

    const database = {
        // ... (Keep your previous General, Psych, and ER modules here)
        charting: [
            { 
                name: "SAMUEL_W", age: "54", sex: "M",
                scribbles: "Eyes looking yellow. Heavy drinker—20 years. Belly is hard and big. Looks like liver failure.", 
                keywords: ["JAUNDICE", "CIRRHOSIS", "ALCOHOL"],
                hint: "Keywords: J_______, C_______, A______"
            },
            { 
                name: "EMILY_R", age: "08", sex: "F",
                scribbles: "Kid had the flu. Parents gave aspirin. Now she's puking and acting crazy/confused. Brain swelling?", 
                keywords: ["REYE", "ASPIRIN", "ENCEPHALOPATHY"],
                hint: "Keywords: R___, A______, E_____________"
            },
            { 
                name: "ARTHUR_B", age: "62", sex: "M",
                scribbles: "Chest pain—says it feels like an elephant. Sweating like crazy. EKG shows weird spikes in ST segment.", 
                keywords: ["INFARCTION", "MYOCARDIAL", "EKG"],
                hint: "Keywords: I________, M________, E__"
            },
            { 
                name: "SARAH_K", age: "29", sex: "F",
                scribbles: "Leg is huge and red. Just got off a plane from London. Pain when she walks. Need to check for a clot.", 
                keywords: ["THROMBOSIS", "ULTRASOUND", "DVT"],
                hint: "Keywords: T________, U________, D__"
            },
            { 
                name: "UNKNOWN_SUBJ", age: "19", sex: "M",
                scribbles: "Found talking to walls. Says he hears 'The Absolute'. No emotion on face. Rambling nonsense.", 
                keywords: ["SCHIZOPHRENIA", "HALLUCINATIONS", "PSYCHOSIS"],
                hint: "Keywords: S____________, H____________, P________"
            },
            { 
                name: "HENRY_V", age: "41", sex: "M",
                scribbles: "Stiff neck. Can't look at the lights. High fever. Spinal tap needed ASAP.", 
                keywords: ["MENINGITIS", "LUMBAR", "FEVER"],
                hint: "Keywords: M_________, L_____, F____"
            },
            { 
                name: "CLARA_D", age: "33", sex: "F",
                scribbles: "Can't breathe. Wheezing. Used her inhaler but it didn't help. Chest feels tight.", 
                keywords: ["ASTHMA", "WHEEZING", "RESPIRATORY"],
                hint: "Keywords: A_____, W_______, R__________"
            },
            { 
                name: "PETER_G", age: "70", sex: "M",
                scribbles: "Can't remember his wife's name. Getting lost in his own house. Brain is going.", 
                keywords: ["ALZHEIMERS", "DEMENTIA", "MEMORY"],
                hint: "Keywords: A_________, D_______, M_____"
            },
            { 
                name: "LISA_M", age: "25", sex: "F",
                scribbles: "Ate peanuts by mistake. Throat closing up. Hives everywhere. Get the epi-pen.", 
                keywords: ["ANAPHYLAXIS", "ALLERGIC", "EPINEPHRINE"],
                hint: "Keywords: A__________, A_______, E__________"
            },
            { 
                name: "VICTOR_S", age: "50", sex: "M",
                scribbles: "Passed out at dinner. Smells like fruit? Sugar is probably through the roof.", 
                keywords: ["DIABETIC", "KETOACIDOSIS", "GLUCOSE"],
                hint: "Keywords: D_______, K___________, G______"
            }
        ]
    };

    function startModule(mod) {
        currentModule = mod;
        score = 0;
        document.getElementById('menu-view').classList.add('hidden');
        document.getElementById('work-view').classList.remove('hidden');
        document.getElementById('module-title').innerText = "MODULE: " + mod.toUpperCase();
        updateScoreDisplay();
        loadNewCase();
    }

    function loadNewCase() {
        const modCases = database[currentModule];
        const c = modCases[score % modCases.length];
        currentAnswer = c.answer || "";
        currentKeywords = c.keywords || [];
        currentHint = c.hint;

        if (currentModule === 'charting') {
            document.getElementById('case-display').innerHTML = `
                <div class="patient-file">
                    <span class="scribble-title">[PHYSICIAN_SCRIBBLED_NOTES]</span>
                    * NAME: ${c.name}<br>
                    * AGE/SEX: ${c.age} / ${c.sex}<br>
                    * NOTES: ${c.scribbles}
                </div>
            `;
        } else {
            document.getElementById('case-display').innerHTML = `<div class="patient-file"><strong>[DATA_FILE]</strong><br><br>${c.data}</div>`;
        }
        
        renderInput(c);
    }

    function renderInput(c) {
        const inputArea = document.getElementById('input-container');
        if (currentModule === 'charting') {
            inputArea.innerHTML = `
                <p>TRANSCRIBE PROFESSIONAL CLINICAL NOTE:</p>
                <textarea id="user-text" placeholder="Patient ${c.name} presents with..."></textarea>
                <button class="submit-btn" onclick="checkCharting()">UPLINK TO MAINFRAME</button>
                <button class="hint-btn" onclick="showHint()">[ NEED HELP? ]</button>
            `;
            document.getElementById('user-text').focus();
        } else {
            inputArea.innerHTML = `
                <p id="prompt-text">${c.prompt || "TYPE DIAGNOSIS:"}</p>
                <input type="text" id="user-input" autocomplete="off">
                <button class="hint-btn" onclick="showHint()">[ NEED HELP? ]</button>
            `;
            const input = document.getElementById('user-input');
            input.focus();
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInput(input.value); });
        }
        document.getElementById('feedback').innerText = "";
    }

    function handleInput(val) {
        val = val.trim().toUpperCase();
        if (val === CHEAT_CODE) { score = 10; runProgressBar(true); return; }
        runProgressBar(val === currentAnswer);
    }

    function checkCharting() {
        const val = document.getElementById('user-text').value.toUpperCase();
        if (val.includes(CHEAT_CODE)) { score = 10; runProgressBar(true); return; }
        
        let matches = 0;
        currentKeywords.forEach(k => { if (val.includes(k.toUpperCase())) matches++; });

        if (matches >= 3) { runProgressBar(true); } 
        else { 
            document.getElementById('feedback').innerText = `INSUFFICIENT DATA. NOTE REQUIRES MORE CLINICAL PRECISION. (MATCHED: ${matches}/3)`;
        }
    }

    function showHint() { document.getElementById('feedback').innerText = "HINT: " + currentHint; }

    function runProgressBar(isCorrect) {
        document.getElementById('input-container').classList.add('hidden');
        document.getElementById('prog-cont').style.display = "block";
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) { clearInterval(interval); finalize(isCorrect); } 
            else { width += 10; document.getElementById('prog-bar').style.width = width + '%'; }
        }, 50);
    }

    function finalize(isCorrect) {
        document.getElementById('prog-cont').style.display = "none";
        document.getElementById('prog-bar').style.width = "0%";
        document.getElementById('input-container').classList.remove('hidden');

        if (isCorrect) {
            if (score < 10) score++;
            updateScoreDisplay();
            if (score >= 10) { completedModules[currentModule] = true; checkTotalProgression(); } 
            else { loadNewCase(); }
        } else {
            document.getElementById('feedback').innerText = "ERROR: DIAGNOSIS NOT RECOGNIZED.";
            const input = document.getElementById('user-input') || document.getElementById('user-text');
            if(input) { input.disabled = false; input.focus(); }
        }
    }

    function updateScoreDisplay() { document.getElementById('progress-text').innerText = `MODULE PROGRESS: ${score} / 10`; }

    function checkTotalProgression() {
        const btn = document.getElementById('btn-' + currentModule);
        if (btn) { btn.innerText = currentModule.toUpperCase() + " [COMPLETE]"; btn.disabled = true; }

        if (Object.values(completedModules).every(v => v === true)) {
            document.getElementById('feedback').innerText = "CURRICULUM VALIDATED. ACCESSING ARCHIVES...";
            setTimeout(() => window.location.href = "index.html", 3000);
        } else {
            document.getElementById('work-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
