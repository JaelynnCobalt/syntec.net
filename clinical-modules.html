<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLINICAL PRACTICE - J13</title>
    <style>
        body {
            background-color: #000; color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: uppercase; overflow: hidden;
        }
        .crt-monitor {
            position: relative; width: 95vw; max-width: 850px; height: 95vh;
            padding: 25px; border: 15px solid #2a2a2a; border-radius: 40px;
            background: #050505; box-shadow: inset 0 0 80px #000;
            display: flex; flex-direction: column;
        }
        .header { border-bottom: 2px solid #33ff33; padding-bottom: 10px; margin-bottom: 15px; }
        .module-box { border: 1px solid #33ff33; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .menu-btn { 
            background: transparent; color: #33ff33; border: 1px solid #33ff33; 
            padding: 15px; margin: 10px 0; cursor: pointer; text-align: left; font-family: inherit; width: 100%;
        }
        .menu-btn:hover:not(:disabled) { background: #33ff33; color: #000; }
        .menu-btn:disabled { color: #1a551a; border-color: #1a551a; cursor: not-allowed; opacity: 0.6; }
        .patient-file { background: rgba(51, 255, 51, 0.05); padding: 15px; border-left: 4px solid #33ff33; margin-bottom: 20px; line-height: 1.6; font-size: 0.9rem; border-style: dashed;}
        .scribble-title { color: #fff; text-decoration: underline; margin-bottom: 10px; display: block; }
        input[type="text"], textarea {
            background: rgba(51, 255, 51, 0.1); border: 1px solid #33ff33;
            color: #33ff33; font-family: inherit; font-size: 1rem; width: 100%; outline: none; padding: 10px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; text-transform: uppercase; }
        .progress-container { width: 100%; height: 12px; border: 1px solid #33ff33; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #33ff33; }
        .score-board { display: flex; justify-content: space-between; font-size: 0.9rem; color: #1a551a; }
        .hint-btn, .submit-btn { 
            background: #1a551a; color: #33ff33; border: none; padding: 10px; 
            margin-top: 10px; cursor: pointer; font-family: inherit;
        }
        .submit-btn { background: #33ff33; color: #000; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1 id="module-title">SYSTEM SELECTION MENU</h1>
        <div class="score-board">
            <span>USER: INTERN_J13</span>

        </div>
    </div>

    <div id="menu-view" class="module-box">
        <p>SELECT TRAINING TRACK:</p>
        <button class="menu-btn" id="btn-general" onclick="startModule('general')">01. GENERAL MEDICINE</button>
        <button class="menu-btn" id="btn-psychiatry" onclick="startModule('psychiatry')">02. PSYCHIATRY</button>
        <button class="menu-btn" id="btn-emergency" onclick="startModule('emergency')">03. EMERGENCY DEPARTMENT</button>
        <button class="menu-btn" id="btn-charting" onclick="startModule('charting')">04. CHARTING & OBSERVATIONS</button>
    </div>

    <div id="work-view" class="module-box hidden">
        <div id="case-display"></div>
        <div id="input-container">
            </div>
        <div class="progress-container" id="prog-cont"><div class="progress-bar" id="prog-bar"></div></div>
        <p id="feedback" style="margin-top:10px;"></p>
    </div>
</div>

    function startModule(mod) {
        currentModule = mod;
        score = 0;
        document.getElementById('menu-view').classList.add('hidden');
        document.getElementById('work-view').classList.remove('hidden');
        document.getElementById('module-title').innerText = "MODULE: " + mod.toUpperCase();
        updateScoreDisplay();
        loadNewCase();
    }

    function loadNewCase() {
        const modCases = database[currentModule];
        // Cycle through cases or random
        const c = modCases[score % modCases.length];
        currentAnswer = c.answer || "";
        currentKeywords = c.keywords || [];
        currentHint = c.hint;

        const display = document.getElementById('case-display');
        const inputArea = document.getElementById('input-container');

        if (currentModule === 'charting') {
            display.innerHTML = `
                <div class="patient-file">
                    <span class="scribble-title">[PHYSICIAN_NOTES]</span>
                    * NAME: ${c.name}<br>
                    * AGE/SEX: ${c.age} / ${c.sex}<br>
                    * NOTES: ${c.scribbles}
                </div>`;
            inputArea.innerHTML = `
                <p>TRANSCRIBE PROFESSIONAL CLINICAL NOTE:</p>
                <textarea id="user-text" placeholder="ENTER NOTE..."></textarea>
                <button class="submit-btn" onclick="processInput()">UPLINK TO MAINFRAME</button>
                <button class="hint-btn" onclick="showHint()">[ HINT ]</button>`;
            document.getElementById('user-text').focus();
        } else {
            display.innerHTML = `<div class="patient-file"><strong>[DATA_FILE]</strong><br><br>${c.data}</div>`;
            inputArea.innerHTML = `
                <p id="prompt-text">${c.prompt || "TYPE DIAGNOSIS AND PRESS ENTER:"}</p>
                <input type="text" id="user-input" autocomplete="off">
                <button class="hint-btn" onclick="showHint()">[ HINT ]</button>`;
            const input = document.getElementById('user-input');
            input.focus();
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') processInput(); });
        }
        document.getElementById('feedback').innerText = "";
    }

    function processInput() {
        let val = "";
        let isCorrect = false;

        if (currentModule === 'charting') {
            val = document.getElementById('user-text').value.toUpperCase();
            if (val.includes(CHEAT_CODE)) { score = 10; isCorrect = true; } 
            else {
                let matches = 0;
                currentKeywords.forEach(k => { if (val.includes(k.toUpperCase())) matches++; });
                isCorrect = (matches >= 3);
            }
        } else {
            val = document.getElementById('user-input').value.trim().toUpperCase();
            if (val === CHEAT_CODE) { score = 10; isCorrect = true; }
            else { isCorrect = (val === currentAnswer); }
        }

        runProgressBar(isCorrect);
    }

    function runProgressBar(isCorrect) {
        document.getElementById('input-container').classList.add('hidden');
        document.getElementById('prog-cont').style.display = "block";
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finalize(isCorrect);
            } else { width += 10; document.getElementById('prog-bar').style.width = width + '%'; }
        }, 40);
    }

    function finalize(isCorrect) {
        document.getElementById('prog-cont').style.display = "none";
        document.getElementById('prog-bar').style.width = "0%";
        document.getElementById('input-container').classList.remove('hidden');

        if (isCorrect) {
            if (score < 10) score++;
            updateScoreDisplay();
            if (score >= 10) {
                completedModules[currentModule] = true;
                markModuleComplete();
            } else {
                loadNewCase();
            }
        } else {
            document.getElementById('feedback').innerText = "ERROR: DATA REJECTED. RE-EVALUATE.";
            const input = document.getElementById('user-input') || document.getElementById('user-text');
            if(input) input.focus();
        }
    }

    function markModuleComplete() {
        document.getElementById('feedback').innerText = "MODULE VALIDATED. SAVING TO ARCHIVE...";
        const btn = document.getElementById('btn-' + currentModule);
        if (btn) {
            btn.innerText = currentModule.toUpperCase() + " [COMPLETE]";
            btn.disabled = true;
        }

        setTimeout(() => {
            if (Object.values(completedModules).every(v => v === true)) {
                document.getElementById('feedback').innerText = "CURRICULUM COMPLETE. RETURNING...";
                setTimeout(() => window.location.href = "index.html", 2000);
            } else {
                document.getElementById('work-view').classList.add('hidden');
                document.getElementById('menu-view').classList.remove('hidden');
                document.getElementById('module-title').innerText = "SYSTEM SELECTION MENU";
            }
        }, 1500);
    }

    function updateScoreDisplay() {
        document.getElementById('progress-text').innerText = `MODULE PROGRESS: ${score} / 10`;
    }

    function showHint() {
        document.getElementById('feedback').innerText = "HINT: " + currentHint;
    }
</script>
</body>
</html>
