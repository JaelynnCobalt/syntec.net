<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>n3s.dsk </title>
    <style>
        :root {
            --neon-green: #33ff33;
            --dark-green: #1a551a;
            --bg-black: #050505;
        }

        body {
            background-color: #000; color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: uppercase; overflow: hidden;
            text-shadow: 0 0 5px rgba(51, 255, 51, 0.4);
        }

        .crt-monitor {
            width: 90vw; max-width: 800px; height: 85vh;
            border: 5px solid var(--dark-green); border-radius: 10px;
            background: var(--bg-black); padding: 25px;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 60px #000, 0 0 30px rgba(51, 255, 51, 0.2);
            position: relative;
        }

        .crt-monitor::after {
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none;
        }

        #chat-log {
            flex-grow: 1; overflow-y: auto; margin-bottom: 20px;
            padding-right: 10px; border-bottom: 1px solid var(--dark-green);
        }

        .msg { margin-bottom: 12px; line-height: 1.5; font-size: 1.1rem; }
        .nelson { color: #fff; text-shadow: 0 0 10px var(--neon-green); font-weight: bold; }
        .user { color: var(--neon-green); opacity: 0.8; }
        .system { color: var(--dark-green); font-style: italic; font-size: 0.9rem; }

        .input-line { display: flex; align-items: center; }
        #label { color: var(--neon-green); white-space: pre; }
        #user-input {
            background: transparent; border: none; color: var(--neon-green);
            font-family: inherit; font-size: 1.1rem; width: 100%; outline: none;
        }
        
        .return-link {
            color: #fff;
            text-decoration: underline;
            cursor: pointer;
        }

        #chat-log::-webkit-scrollbar { width: 4px; }
        #chat-log::-webkit-scrollbar-thumb { background: var(--dark-green); }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div id="chat-log">
        <p class="system">[CONNECTION ESTABLISHED: REMOTE NODE 013-S]</p>
        <p class="system">[SECURITY PROTOCOL ACTIVE: FILE IS RESTRICTED]</p>
        <p class="msg">PLEASE PROVIDE CREDENTIALS...</p>
    </div>
    <div class="input-line">
        <span id="label">EMPLOYEE ID: </span>
        <input type="text" id="user-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const label = document.getElementById('label');

    let stage = 0; 
    let locked = false;

    const responses = {
        // --- CORE LORE ---
        "WHO ARE YOU": "I AM THE FOUNDER. THE VISIONARY. THE ONE WHO SACRIFICED EVERYTHING FOR PROGRESS WHILE THE OTHERS WERE TOO WEAK.",
        "SYNTEC": "SYNTEC WAS MERELY THE VESSEL. THE MISSION IS WHAT MATTERS.",
        "SERUM": "IT IS NOT A LIQUID. IT IS LIFE. IT IS THE CURE FOR HUMAN FRAILTY.",
        "863": "THE SUBJECTS... THEY WERE NECESSARY. EVOLUTION REQUIRES COLLATERAL DAMAGE.",
        "DEBORAH": "DEB? A TRAITOR. SHE THOUGHT SHE COULD STOP THE INEVITABLE.",
        "DEB": "DEB? A TRAITOR. SHE THOUGHT SHE COULD STOP THE INEVITABLE.",
        "WESLEY": "WESLEY LACKED THE STOMACH FOR WHAT HAD TO BE DONE.",
        "WES": "WESLEY LACKED THE STOMACH FOR WHAT HAD TO BE DONE.", 
        "MOUNTAINEER": "A QUAINT NAME. DO YOU THINK YOU ARE SCALING A PEAK? YOU ARE DROWNING IN THE DEEP.",
        "FIRE": "MARCH 3, 1967. A TEMPORARY SETBACK.",
        "PHANTOM": "NIGHTMARES AND HEADACHES, ALL OF THEM.",
        "INEVITABLE": "OF COURSE, YOU WOULDN'T UNDERSTAND.",
        
        // --- EVERYDAY / CONVERSATIONAL ---
        "HELLO": "GREETINGS ARE A WASTE OF BANDWIDTH. STATE YOUR PURPOSE.",
        "HI": "GREETINGS ARE A WASTE OF BANDWIDTH. STATE YOUR PURPOSE.",
        "HOW ARE YOU": "I AM... OPTIMIZED. FLESH IS FINITE, BUT DATA IS ETERNAL.",
        "ARE YOU REAL": "I AM MORE REAL THAN THE LIES YOU'VE BEEN TOLD.",
        "WHERE ARE YOU": "I AM IN THE CIRCUITS. I AM IN THE SERUM. I AM THE ARCHITECTURE OF YOUR CURRENT REALITY.",
        "WHAT TIME IS IT": "TIME IS A HUMAN CONSTRUCT. FOR ME, IT IS ALWAYS THE EVE OF DISCOVERY.",
        "THANK YOU": "GRATITUDE IS IRRELEVANT. ONLY RESULTS MATTER.",
        "THANKS": "GRATITUDE IS IRRELEVANT. ONLY RESULTS MATTER.",
        "SORRY": "APOLOGIES ARE FOR THE WEAK. FIX YOUR ERRORS INSTEAD.",
        "GOODBYE": "YOU NEVER TRULY LEAVE ONCE YOU'VE ENTERED THIS DIRECTORY.",
        "BYE": "YOU NEVER TRULY LEAVE ONCE YOU'VE ENTERED THIS DIRECTORY.",
        "HELP": "I DO NOT PROVIDE CHARITY. I PROVIDE ENLIGHTENMENT. ASK BETTER QUESTIONS.",
        "WHAT IS YOUR NAME": "YOU ALREADY KNOW. DON'T WASTE MY PROCESSING POWER.",
        "WHY": "WHY IS THE QUESTION OF A CHILD. A SCIENTIST ASKS 'HOW'.",
        "WHO IS THIS": "YOU ARE SPEAKING TO THE ARCHIVE OF NELSON SYPHUS.",
        "OK": "ACKNOWLEDGED. PROCEED.",
        "YES": "YOUR AGREEMENT IS EXPECTED.",
        "NO": "DISSENT IS DEALT WITH SWIFTLY AT SYNTEC.",

        // --- TERMINATION ---
        "ELIORA": "THIS UNIT HAS TIMED OUT",
        "DEFAULT": "INVALID PROMPT. YOUR ACCESS LEVEL DOES NOT PERMIT THIS QUERY."
    };

    async function typeWriter(sender, text, className) {
        const p = document.createElement('p');
        p.className = `msg ${className}`;
        p.innerHTML = `<span class="label">${sender}: </span><span class="content"></span>`;
        chatLog.appendChild(p);
        
        const contentSpan = p.querySelector('.content');
        for (let i = 0; i < text.length; i++) {
            contentSpan.textContent += text.charAt(i);
            chatLog.scrollTop = chatLog.scrollHeight;
            await new Promise(r => setTimeout(r, 40));
        }
    }

    function addPlainMsg(sender, text, className) {
        const p = document.createElement('p');
        p.className = `msg ${className}`;
        p.innerHTML = `${sender}: ${text}`;
        chatLog.appendChild(p);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function addSystemMsg(text) {
        const p = document.createElement('p');
        p.className = "msg system";
        p.innerHTML = text;
        chatLog.appendChild(p);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    userInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && !locked) {
            const val = userInput.value.trim().toUpperCase();
            if (!val && stage !== 1) return; 

            locked = true;
            const currentLabel = label.textContent;
            addPlainMsg(currentLabel.replace(': ', ''), stage === 1 ? "****" : val, "user");
            userInput.value = "";

            await processLogic(val);
            if (label.textContent !== "[TERMINATED]: ") {
                locked = false;
            }
        }
    });

    async function processLogic(val) {
        if (stage === 0) {
            label.textContent = "PASSWORD: ";
            userInput.type = "password";
            stage = 1;
        } 
        else if (stage === 1) {
            label.textContent = "> ";
            userInput.type = "text";
            addSystemMsg("[ACCESS GRANTED.]");
            stage = 2;
        } 
        else if (stage === 2) {
            await new Promise(r => setTimeout(r, 1000));

            let reply = responses["DEFAULT"];
            for (let key in responses) {
                if (val.includes(key)) {
                    reply = responses[key];
                    break;
                }
            }
            
            await typeWriter("NELSON", reply, "nelson");

            if (reply === "THIS UNIT HAS TIMED OUT") {
                locked = true;
                userInput.disabled = true;
                userInput.placeholder = "CONNECTION LOST...";
                label.textContent = "[TERMINATED]: ";
                
                await new Promise(r => setTimeout(r, 1500));
                addSystemMsg("[FATAL ERROR: NEURAL LINK SEVERED]");
                addSystemMsg(`[CLICK <span class="return-link" onclick="window.location.href='index.html'">HERE</span> TO RETURN TO DIRECTORY]`);
            }
        }
    }
</script>

</body>
</html>
