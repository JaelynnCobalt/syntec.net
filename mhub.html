<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntec Hub - Employee Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #33ff33; --bg: #0a0a0a; --panel: #0d0d0d; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; text-shadow: 0 0 5px var(--neon); overflow: hidden; }
        .header { padding: 10px; border-bottom: 2px solid var(--neon); text-align: center; font-weight: bold; letter-spacing: 2px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .side-panel { width: 280px; border-right: 2px solid var(--neon); padding: 15px; display: flex; flex-direction: column; background: var(--panel); overflow-y: auto; }
        .right-panel { width: 300px; border-left: 2px solid var(--neon); padding: 15px; background: var(--panel); }
        .section-title { border-bottom: 1px solid var(--neon); margin-bottom: 10px; font-size: 0.9rem; padding-bottom: 3px; display: block; }
        .data-point { margin-bottom: 15px; font-size: 0.85rem; line-height: 1.4; }
        .data-label { color: #88ff88; font-size: 0.7rem; display: block; }
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; background: #050505; }
        #messages { flex: 1; overflow-y: auto; border: 1px solid var(--neon); padding: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        input { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; outline: none; width: calc(100% - 18px); margin-bottom: 5px; }
        button { background: var(--neon); color: #000; border: none; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #22cc22; }
        .friend-item { padding: 4px; font-size: 0.85rem; border-bottom: 1px dotted #114411; }
        .task-item { font-size: 0.85rem; margin-bottom: 8px; color: #ffff33; }
    </style>
</head>
<body onclick="document.getElementById('msg-input').focus()">

<div class="header">SYSTEM OVERSEER: PEGASUS NETWORK HUB</div>

<div class="main-container">
    <div class="side-panel">
        <span class="section-title">PERSONNEL DOSSIER</span>
        <div class="data-point"><span class="data-label">NAME</span><span id="user-name">...</span></div>
        <div class="data-point"><span class="data-label">EMPLOYEE ID</span><span id="user-id">---</span></div>
        <div class="data-point"><span class="data-label">CLEARANCE</span><span id="user-clearance">LEVEL 1</span></div>
        <div class="data-point"><span class="data-label">ASSIGNMENT</span><span id="user-project">PENDING</span></div>

        <span class="section-title">SECURE CONTACTS</span>
        <div id="friends-list" style="margin-bottom: 15px;"></div>
        <input type="text" id="search-id" placeholder="LINK ID (Ex: J2000-123)">
        <button onclick="addFriend()">LINK PERSONNEL</button>
    </div>

    <div class="chat-area">
        <span class="section-title">SECURE CHANNEL: #GENERAL</span>
        <div id="messages"></div>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="ENCRYPT MESSAGE...">
            <button onclick="sendMessage()" style="width: 80px;">SEND</button>
        </div>
    </div>

    <div class="right-panel">
        <span class="section-title">ACTIVE DIRECTIVES</span>
        <div id="task-list">
            <div class="task-item">[!] INITIALIZE HUB CONNECTION</div>
            <div class="task-item">[!] SYNC PERSONNEL DATA</div>
        </div>
        <button onclick="location.href='index.html'" style="margin-top:20px; background:transparent; color:var(--neon); border: 1px solid var(--neon);">LOGOUT</button>
    </div>
</div>

<script>
const S_URL = "https://zefaapnmutxgnabpxoog.supabase.co";
const S_KEY = "sb_publishable_zI-xgDNT8kQciUQ-j_EFsw_89a_CyGM";
const _supabase = supabase.createClient(S_URL, S_KEY);

const myID = localStorage.getItem('syntec_id') || "GUEST";

// 1. FETCH PROFILE DATA
async function loadProfile() {
    const { data, error } = await _supabase.from('profiles').select('*').eq('employee_id', myID).maybeSingle();
    if (data) {
        document.getElementById('user-name').textContent = data.first_name;
        document.getElementById('user-id').textContent = data.employee_id;
        document.getElementById('user-clearance').textContent = data.clearance_level || "LEVEL 1 - INTERN";
        document.getElementById('user-project').textContent = data.project_assignment || "EVALUATION PENDING";
    }
}

// 2. LOAD FRIENDS
async function loadFriends() {
    const { data } = await _supabase.from('friends').select('*').eq('user_id', myID);
    const list = document.getElementById('friends-list');
    list.innerHTML = data && data.length ? "" : "NO LINKS ESTABLISHED";
    if (data) {
        data.forEach(f => {
            const div = document.createElement('div');
            div.className = "friend-item";
            div.textContent = `> ${f.friend_name} [${f.friend_id}]`;
            list.appendChild(div);
        });
    }
}

// 3. ADD FRIEND (FIXED)
async function addFriend() {
    const targetID = document.getElementById('search-id').value.toUpperCase().trim();
    if (!targetID || targetID === myID) return alert("INVALID ID");

    // Check if employee exists
    const { data: profile, error } = await _supabase.from('profiles').select('first_name').eq('employee_id', targetID).maybeSingle();

    if (profile) {
        const { error: fError } = await _supabase.from('friends').insert([{ 
            user_id: myID, 
            friend_id: targetID, 
            friend_name: profile.first_name 
        }]);
        if (fError) alert("LINK ALREADY EXISTS OR ERROR.");
        else {
            document.getElementById('search-id').value = "";
            loadFriends();
        }
    } else {
        alert("PERSONNEL ID NOT FOUND IN DATABASE.");
    }
}

// 4. CHAT (FIXED TABLE NAME)
async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content) return;

    const { error } = await _supabase.from('internal_messages').insert([{ 
        sender_name: myID, 
        content: content 
    }]);
    
    if (error) console.error("Chat Error:", error);
    input.value = "";
}

// 5. REALTIME LISTENER (FIXED TABLE NAME)
_supabase.channel('public:internal_messages')
.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'internal_messages' }, payload => {
    const msg = payload.new;
    const div = document.createElement('p');
    div.innerHTML = `<span style="color:#88ff88">[${msg.sender_name}]</span>: ${msg.content}`;
    const mBox = document.getElementById('messages');
    mBox.appendChild(div);
    mBox.scrollTop = mBox.scrollHeight;
}).subscribe();

// Load previous messages on start
async function loadInitialMessages() {
    const { data } = await _supabase.from('internal_messages').select('*').order('created_at', { ascending: true }).limit(50);
    if (data) {
        const mBox = document.getElementById('messages');
        data.forEach(msg => {
            const div = document.createElement('p');
            div.innerHTML = `<span style="color:#88ff88">[${msg.sender_name}]</span>: ${msg.content}`;
            mBox.appendChild(div);
        });
        mBox.scrollTop = mBox.scrollHeight;
    }
}

// Init
loadProfile();
loadFriends();
loadInitialMessages();
</script>
</body>
</html>
