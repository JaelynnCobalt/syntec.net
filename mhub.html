<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntec(TM) - Employee Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #33ff33; --bg: #0a0a0a; --panel: #0d0d0d; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; text-shadow: 0 0 5px var(--neon); overflow: hidden; }
        .header { padding: 10px; border-bottom: 2px solid var(--neon); text-align: center; font-weight: bold; letter-spacing: 2px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        .side-panel { width: 260px; border-right: 2px solid var(--neon); padding: 15px; display: flex; flex-direction: column; background: var(--panel); overflow-y: auto; }
        .right-panel { width: 240px; border-left: 2px solid var(--neon); padding: 15px; background: var(--panel); display: flex; flex-direction: column; }
        .section-title { border-bottom: 1px solid var(--neon); margin-bottom: 10px; font-size: 0.8rem; padding-bottom: 3px; display: block; opacity: 0.8; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; background: #050505; }
        .chat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 5px; border: 1px solid #114411; }
        #messages { flex: 1; overflow-y: auto; border: 1px solid var(--neon); padding: 10px; margin-bottom: 10px; font-size: 0.9rem; background: rgba(0,20,0,0.1); }
        
        #contact-select { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 8px; font-family: inherit; flex: 1; cursor: pointer; outline: none; }
        
        input { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; outline: none; width: calc(100% - 18px); margin-bottom: 5px; }
        button { background: var(--neon); color: #000; border: none; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        
        .data-point { margin-bottom: 12px; font-size: 0.85rem; }
        .data-label { color: #88ff88; font-size: 0.65rem; display: block; }
        .friend-item { font-size: 0.8rem; padding: 6px; border: 1px solid transparent; cursor: pointer; margin-bottom: 2px; }
        .friend-item:hover { border: 1px solid var(--neon); background: rgba(51, 255, 51, 0.1); }
        .task-item { font-size: 0.8rem; color: #ffff33; margin-bottom: 10px; padding-left: 5px; }
    </style>
</head>
<body>

<div class="header">SYSTEM OVERSEER: PEGASUS NETWORK HUB</div>

<div class="main-container">
    <div class="side-panel">
        <span class="section-title">PERSONNEL DOSSIER</span>
        <div class="data-point"><span class="data-label">NAME</span><span id="user-name">...</span></div>
        <div class="data-point"><span class="data-label">EMPLOYEE ID</span><span id="user-id">---</span></div>
        
        <span class="section-title">ACTIVE CONNECTIONS</span>
        <div id="friends-list" style="margin-bottom: 15px; flex-grow: 1; overflow-y: auto;">
            </div>

        <input type="text" id="search-id" placeholder="LINK ID...">
        <button onclick="addFriend()">ESTABLISH LINK</button>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span style="font-size: 0.7rem;">CHANNEL:</span>
            <select id="contact-select" onchange="loadInitialMessages()">
                <option value="GLOBAL"># GENERAL-BROADCAST</option>
            </select>
        </div>
        <div id="messages"></div>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="ENTER ENCRYPTED STRING...">
            <button onclick="sendMessage()" style="width: 80px;">SEND</button>
        </div>
    </div>

    <div class="right-panel">
        <span class="section-title">ACTIVE DIRECTIVES</span>
        <div id="task-list">
            <div class="task-item">[!] COMPLETE BIO-SYNC</div>
            <div class="task-item">[!] SYNC PERSONNEL LOGS</div>
            <div class="task-item">[ ] MONITOR CHANNEL #4</div>
        </div>
        
        <div style="margin-top: auto;">
            <span class="section-title">SYSTEM STATUS</span>
            <div class="data-point" style="font-size: 0.65rem;">
                UPLINK: SECURE<br>
                ENC: AES-256<br>
                NODE: PEGASUS-V2
            </div>
            <button onclick="location.href='index.html'" style="background:transparent; color:var(--neon); border: 1px solid var(--neon);">LOGOUT</button>
        </div>
    </div>
</div>

<script>
const S_URL = "https://zefaapnmutxgnabpxoog.supabase.co";
const S_KEY = "sb_publishable_zI-xgDNT8kQciUQ-j_EFsw_89a_CyGM";
const _supabase = supabase.createClient(S_URL, S_KEY);

const myID = localStorage.getItem('syntec_id') || "GUEST";

// Helper to switch chat recipient
function switchToChat(id) {
    const dropdown = document.getElementById('contact-select');
    dropdown.value = id;
    loadInitialMessages();
}

async function loadProfile() {
    const { data } = await _supabase.from('profiles').select('*').eq('employee_id', myID).maybeSingle();
    if (data) {
        document.getElementById('user-name').textContent = data.first_name;
        document.getElementById('user-id').textContent = data.employee_id;
    }
}

async function loadFriends() {
    const { data } = await _supabase.from('friends').select('*').eq('user_id', myID);
    const list = document.getElementById('friends-list');
    const dropdown = document.getElementById('contact-select');
    
    list.innerHTML = "";
    dropdown.innerHTML = '<option value="GLOBAL"># GENERAL-BROADCAST</option>';
    
    if (data && data.length > 0) {
        data.forEach(f => {
            // Sidebar item
            const div = document.createElement('div');
            div.className = "friend-item";
            div.textContent = `> ${f.friend_name}`;
            div.onclick = () => switchToChat(f.friend_id);
            list.appendChild(div);

            // Dropdown option
            const opt = document.createElement('option');
            opt.value = f.friend_id;
            opt.textContent = `SECURE: ${f.friend_name.toUpperCase()}`;
            dropdown.appendChild(opt);
        });
    } else {
        list.innerHTML = "<span style='font-size:0.7rem; opacity:0.5;'>NO LINKS FOUND</span>";
    }
}

async function addFriend() {
    const targetID = document.getElementById('search-id').value.toUpperCase().trim();
    if (!targetID || targetID === myID) return;
    const { data: profile } = await _supabase.from('profiles').select('first_name').eq('employee_id', targetID).maybeSingle();
    if (profile) {
        await _supabase.from('friends').insert([{ user_id: myID, friend_id: targetID, friend_name: profile.first_name }]);
        document.getElementById('search-id').value = "";
        loadFriends();
    }
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    const receiver = document.getElementById('contact-select').value;
    if (!content) return;

    await _supabase.from('internal_messages').insert([{ 
        sender_name: myID, 
        content: content,
        receiver_id: receiver 
    }]);
    input.value = "";
}

function displayMessage(msg) {
    const mBox = document.getElementById('messages');
    const div = document.createElement('p');
    div.style.margin = "4px 0";
    div.innerHTML = `<span style="color:#88ff88">[${msg.sender_name}]</span>: ${msg.content}`;
    mBox.appendChild(div);
    mBox.scrollTop = mBox.scrollHeight;
}

async function loadInitialMessages() {
    const mBox = document.getElementById('messages');
    mBox.innerHTML = ""; 
    const target = document.getElementById('contact-select').value;

    let query = _supabase.from('internal_messages').select('*');
    
    if (target === "GLOBAL") {
        query = query.eq('receiver_id', 'GLOBAL');
    } else {
        query = query.or(`and(sender_name.eq.${myID},receiver_id.eq.${target}),and(sender_name.eq.${target},receiver_id.eq.${myID})`);
    }

    const { data } = await query.order('created_at', { ascending: true }).limit(50);
    if (data) data.forEach(displayMessage);
}

_supabase.channel('public:internal_messages')
.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'internal_messages' }, payload => {
    const msg = payload.new;
    const currentTarget = document.getElementById('contact-select').value;
    if (currentTarget === "GLOBAL" && msg.receiver_id === "GLOBAL") {
        displayMessage(msg);
    } else if (
        (msg.sender_name === myID && msg.receiver_id === currentTarget) || 
        (msg.sender_name === currentTarget && msg.receiver_id === myID)
    ) {
        displayMessage(msg);
    }
}).subscribe();

loadProfile();
loadFriends();
loadInitialMessages();
</script>
</body>
</html>
