<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYNTEC PEGASUS SYSTEM</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; }
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { border: 1px solid #33ff33; }
        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }
        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }
        .message-head { font-size: 0.9rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.9rem; border-top: 1px dashed #33ff33; padding-top: 10px; }
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.8rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .back-btn:hover { background: #33ff33; color: #000; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>PEGASUS MAIL SERVER V4.1</h1>
        <small>ID: USER_J13 [INT-3] | DRIVE STATUS: OPTIMAL</small>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <button class="nav-item active" onclick="renderList('inbox')">01. INBOX</button>
            <button class="nav-item" onclick="renderList('starred')">02. STARRED</button>
            <button class="nav-item" onclick="renderList('sent')">03. SENT</button>
            <button class="nav-item" onclick="renderList('trash')">04. TRASH</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY</button>
                <button class="dead-btn">DELETE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // THREAD: PSYCH EVAL
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "NOV-02-1986", subject: "RE: EVALUATION RESULTS", body: "THE UPDATED ASSESSMENT FROM THE COMPANY PHYSICIAN IS ATTACHED. THEY HAVE NOTED 'SIGNIFICANT COGNITIVE RIGIDITY' AND 'HYPER-FOCUS ON LOGARITHMIC STRUCTURES.' I TOLD THEM THIS IS AN ASSET TO THE PEGASUS PROJECT, NOT A DEFICIT. DO NOT LET THE TERMINOLOGY UPSET YOU. \n\n- ABBA", starred: true },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "NOV-01-1986", subject: "RE: EVALUATION RESULTS", body: "DID THEY MENTION THE AUDITORY HYPER-SENSITIVITY IN LAB 4? THE HUMMING FROM THE MAINFRAME IS INTERFERING WITH MY DATA ENTRY. I REQUIRE THE NOISE-REDUCTION HEADSETS." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-31-1986", subject: "EVALUATION RESULTS", body: "THE CLINICAL TEAM HAS FINISHED THE INTERN PSYCH-EVALS. YOURS IS MARKED UNDER 'ASOCIAL TENDENCIES - CATEGORY B'. THEY ARE RECOMMENDING YOU REMAIN IN ISOLATED DATA ENTRY FOR THE TIME BEING. I CONCUR. IT IS QUIETER FOR YOU THERE." },
        
        // STARRED TECHNICAL LORE
        { folder: 'starred', from: "b.cobalt@syntec.net", date: "OCT-20-1986", subject: "CORE ALIGNMENT", body: "WHEN CALCULATING THE RADIANCE VARIANCE, ENSURE YOU ARE USING THE 1982 STANDARD, NOT THE NEW REVISION. THE MATHEMATICS ARE CLEANER.", starred: true },
        { folder: 'starred', from: "it.admin@syntec.net", date: "OCT-15-1986", subject: "OVERRIDE KEY", body: "YOUR WORKSTATION OVERRIDE KEY IS: 8-6-3. DO NOT LOSE THIS.", starred: true },
        
        // INBOX (MUNDANE/TECHNICAL)
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "NOV-04-1986", subject: "LOG DISCREPANCY", body: "INTERN J13, YOUR ENTRIES FOR THE 03:00 SCAN ARE MISSING. PLEASE EXPLAIN." },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "NOV-03-1986", subject: "TERMINAL LOCKOUT", body: "REMINDER: THREE FAILED LOGIN ATTEMPTS WILL TRIGGER A HARD-DISK WIPE. WATCH YOUR KEYSTROKES." },
        { folder: 'inbox', from: "lab.coord@syntec.net", date: "NOV-02-1986", subject: "REAGENT INVENTORY", body: "WE ARE LOW ON STABILIZER C. PLEASE UPDATE THE PROCUREMENT LIST BY EOD." },
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-30-1986", subject: "VENTILATION NOTICE", body: "AIR FILTRATION IN THE NORTH WING WILL BE REDUCED TO 50% CAPACITY TONIGHT." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "LUNCH", body: "I HAVE LEFT THE PREPARED MEAL IN THE SECONDARY FRIDGE. IT IS LABELED 'COBALT - DO NOT TOUCH'. THE TEXTURE SHOULD BE SUITABLE TODAY." },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-27-1986", subject: "DRESS CODE REMINDER", body: "ALL STAFF MUST WEAR SYNTEC-ISSUED LAB COATS AT ALL TIMES. NO EXCEPTIONS." },
        { folder: 'inbox', from: "accounting@syntec.net", date: "OCT-25-1986", subject: "STIPEND UPDATE", body: "INTERN STIPENDS WILL BE DEPOSITED ON THE 1ST. ENSURE YOUR BANKING SLIPS ARE FILED." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-22-1986", subject: "READING MATERIAL", body: "I HAVE PLACED THE VOLUMES ON QUANTUM STASIS ON YOUR DESK. PAGE 402 HAS AN ERROR IN THE SECOND FORMULA. SEE IF YOU CAN FIND IT." },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-20-1986", subject: "PEGASUS UPTIME", body: "SERVER STABILITY HAS REACHED 99.4%. GOOD WORK ON THE BUFFER LOGS." },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-18-1986", subject: "QUARTERLY PROGRESS", body: "MR. SYPHUS HAS NOTED THE EFFICIENCY OF THE PEGASUS INTERNS. KEEP UP THE PACE." },
        
        // SENT (Jaelynn's focus)
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "NOV-04-1986", subject: "RE: LOG DISCREPANCY", body: "THE SCAN WAS NOT MISSING. THE FOLDER WAS MISLABELED BY THE AUTOMATED SYSTEM. I HAVE CORRECTED THE FILENAME TO PEGASUS_0300_A." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: LUNCH", body: "THANK YOU. THE PREVIOUS BATCH WAS TOO SOFT. I PREFER THE CONSISTENCY OF THIS ONE." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-22-1986", subject: "RE: READING MATERIAL", body: "THE ERROR IS ON LINE 14. THEY FORGOT TO ACCOUNT FOR THE DECAY CONSTANT. IT WAS OBVIOUS." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-15-1986", subject: "FILING COMPLETE", body: "ALL RECORDS FROM SEPTEMBER HAVE BEEN COMPLETED AND ARCHIVED." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-10-1986", subject: "STATIONERY REQUEST", body: "I REQUIRE THREE MORE REAMS OF GREEN-BAR PAPER FOR THE OVERFLOW LOGS." },
        
        // TRASH
        { folder: 'trash', from: "marketing@syntec.net", date: "OCT-05-1986", subject: "SYNTEC PRIDE", body: "BUY YOUR SYNTEC BRANDED MUGS IN THE LOBBY!" },
        { folder: 'trash', from: "hr.dept@syntec.net", date: "OCT-02-1986", subject: "SURVEY", body: "HOW ARE WE DOING? TAKE THE EMPLOYEE SATISFACTION SURVEY." },
        { folder: 'trash', from: "it.admin@syntec.net", date: "SEP-28-1986", subject: "DELETED FILES", body: "THE SYSTEM HAS AUTOMATICALLY PURGED YOUR TEMP DATA." },
        { folder: 'trash', from: "facilities@syntec.net", date: "SEP-25-1986", subject: "ELEVATOR REPAIR", body: "ELEVATOR 2 IS NOW FUNCTIONAL." },
        { folder: 'trash', from: "newsletter@syntec.net", date: "SEP-20-1986", subject: "NEWSLETTER", body: "WELCOME TO THE FALL QUARTER AT SYNTEC." }
    ];

    function renderList(folderName) {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.nav-item')).find(b => b.innerText.toLowerCase().includes(folderName));
        if(activeBtn) activeBtn.classList.add('active');

        const filtered = mails.filter(m => {
            if(folderName === 'starred') return m.starred === true;
            return m.folder === folderName;
        });

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const star = m.starred ? "[*]" : "[ ]";
            row.innerHTML = `${star} ${m.date} | ${m.from.split('@')[0]} | ${m.subject}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });
        
        closeMessage();
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    renderList('inbox');
</script>
</body>
</html>
