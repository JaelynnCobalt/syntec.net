<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYN PEGASUS SYSTEM</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; }
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { border: 1px solid #33ff33; }
        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }
        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }
        .message-head { font-size: 0.9rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.9rem; border-top: 1px dashed #33ff33; padding-top: 10px; }
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.8rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .back-btn:hover { background: #33ff33; color: #000; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>PEGASUS MAIL SERVER V4.1</h1>
        <small>ID: USER_J13 [INT-3] | DRIVE STATUS: OPTIMAL</small>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <button class="nav-item active" onclick="renderList('inbox')">01. INBOX</button>
            <button class="nav-item" onclick="renderList('starred')">02. STARRED</button>
            <button class="nav-item" onclick="renderList('sent')">03. SENT</button>
            <button class="nav-item" onclick="renderList('trash')">04. TRASH</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY</button>
                <button class="dead-btn">DELETE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // THREAD: THE PSYCH EVAL (1980s Terminology)
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "NOV-02-1986", subject: "RE: EVALUATION RESULTS", body: "THE CLINICAL SUMMARY NOTES 'MARKED DEFICITS IN SOCIAL RECIPROCITY' BUT CONFIRMS 'SUPERIOR IQ IN NON-VERBAL DOMAINS.' THEY ARE USING THE TERM ASPERGER'S SYNDROME. \n\n- PAPPAS", starred: true },
        { folder: 'sent', from: "j.13@syntec.net", date: "NOV-01-1986", subject: "RE: EVALUATION RESULTS", body: "THE EVALUATOR KEPT TABBING HIS PEN. IT WAS 72 BEATS PER MINUTE. I COULD NOT FOCUS ON THE PATTERN RECOGNITION BLOCK TEST BECAUSE OF THE SOUND. I BELIEVE MY SCORE WOULD HAVE BEEN 4% HIGHER WITHOUT THE DISTRACTION." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-31-1986", subject: "EVALUATION RESULTS", body: "I HAVE THE PRELIMINARY PSYCH-EVALS FROM THE INTERN POOL. YOURS IS HIGHLIGHTED. THEY WANT TO MONITOR YOUR 'REPETITIVE BEHAVIORS' IN THE LAB. I WILL ENSURE THEY LEAVE YOU TO YOUR WORK. \n\n- PAPPAS", starred: true },
        
        // WESLEY NATHANIAL (The Corporate Voice)
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "NOV-04-1986", subject: "GREAT JOB ON THE BUFFER LOGS", body: "[REDACTED], JUST WANTED TO DROP A LINE AND SAY WE'RE REALLY IMPRESSED WITH THE SPEED OF YOUR ARCHIVING. YOU'RE PUTTING THE OTHER INTERNS TO SHAME! LET'S CHAT ON MONDAY ABOUT EXPANDING YOUR ROLE IN THE PEGASUS WING. KEEP IT UP!" },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-28-1986", subject: "LOG DISCREPANCY", body: "HEY THERE, JUST NOTICED A GAP IN THE 03:00 SCAN. PROBABLY  A GLITCH, BUT COULD YOU TAKE A QUICK LOOK AND SEE WHERE THOSE FILES LANDED? THANKS." },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-15-1986", subject: "LUNCH MIXER?", body: "THE TEAM IS HEADING DOWN TO THE LOBBY FOR A QUICK MIXER TO CELEBRATE THE Q3 WINS. WOULD LOVE TO SEE YOU THERE IF YOU CAN TEAR YOURSELF AWAY FROM THE TERMINAL FOR A BIT!" },

        // COBALT TECHNICAL (The Autistic Voice)
        { folder: 'starred', from: "b.cobalt@syntec.net", date: "OCT-20-1986", subject: "CORE ALIGNMENT", body: "ENSURE YOU ARE UTILIZING THE 1982 RADIANCE STANDARDS. THE 1986 REVISION HAS AN UNACCEPTABLE MARGIN OF ERROR IN THE THIRD DECIMAL PLACE. DO NOT COMPROMISE THE DATA SET.", starred: true },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-12-1986", subject: "LUNCH BATCH", body: "THE PREPARED MEAL IS IN THE FRIDGE. I HAVE SEPARATED THE PROTEIN FROM THE CELLULOSE TO ENSURE THE TEXTURES REMAIN DISTINCT. DO NOT FORGET TO EAT AT 12:00 PRECISELY." },

        // MUNDANE/HR
        { folder: 'inbox', from: "it.admin@syntec.net", date: "NOV-03-1986", subject: "TERMINAL UPDATE", body: "YOUR WORKSTATION WILL REBOOT AT MIDNIGHT. SAVE ALL PROGRESS." },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-27-1986", subject: "BENEFITS FORM #44", body: "PLEASE SIGN THE ATTACHED DISCLOSURE REGARDING LAB SAFETY PROTOCOLS." },
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-24-1986", subject: "NORTH WING ACCESS", body: "THE NORTH GATE WILL BE SECURED DURING THE WEEKEND FOR REPAIRS." },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-20-1986", subject: "OVERRIDE KEY", body: "USER_J13 TEMPORARY KEY: 8-6-3. VALID FOR 24 HOURS.", starred: true },
        { folder: 'inbox', from: "lab.coord@syntec.net", date: "OCT-15-1986", subject: "REAGENT LIST", body: "WE ARE MISSING THE SHIPMENT LOGS FOR THE SODIUM BATCH." },
        { folder: 'inbox', from: "marketing@syntec.net", date: "OCT-10-1986", subject: "SYNTEC SPIRIT WEEK", body: "GET READY FOR OUR ANNUAL SPIRIT WEEK! SHOW YOUR SYNTEC PRIDE." },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-08-1986", subject: "DISK QUOTA", body: "YOU ARE UTILIZING 88% OF YOUR ALLOCATED SECTOR SPACE." },
        
        // SENT
        { folder: 'sent', from: "j.13@syntec.net", date: "NOV-04-1986", subject: "RE: LOG DISCREPANCY", body: "THE SCAN WAS NOT MISSING. THE AUTOMATED NAMING CONVENTION FAILED. I HAVE MANUALLY RE-INDEXED IT UNDER PEGASUS_0300_A." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-28-1986", subject: "RE: LUNCH BATCH", body: "THE TEXTURE WAS OPTIMAL. THANK YOU. THE RED PLASTIC CONTAINER HAS BEEN CLEANED AND RETURNED TO THE STATIONS." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-15-1986", subject: "RE: LUNCH MIXER?", body: "I HAVE 4,200 LINES OF DATA TO AUDIT. I DO NOT HAVE TIME FOR THE MIXER. PLEASE SAVE A SET OF DOCUMENTATION FOR ME IF THERE ARE NEW UPDATES." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-12-1986", subject: "BUFFER ERROR FOUND", body: "I FOUND THE LEAK IN THE PEGASUS LOGGING SCRIPT. IT WAS A TRANSCRIPTION ERROR IN THE C-LOOP." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-05-1986", subject: "STATIONERY REQUEST", body: "I REQUIRE THREE REAMS OF GREEN-BAR FEED PAPER. THE CURRENT STOCK IS SUB-PAR QUALITY." },

        // TRASH
        { folder: 'trash', from: "hr.dept@syntec.net", date: "OCT-02-1986", subject: "SURVEY", body: "HOW ARE WE DOING? TAKE THE EMPLOYEE SATISFACTION SURVEY." },
        { folder: 'trash', from: "it.admin@syntec.net", date: "SEP-28-1986", subject: "DELETED FILES", body: "SYSTEM AUTOMATIC PURGE COMPLETED." },
        { folder: 'trash', from: "newsletter@syntec.net", date: "SEP-20-1986", subject: "NEWSLETTER", body: "WELCOME TO THE FALL QUARTER AT SYNTEC." },
        { folder: 'trash', from: "facilities@syntec.net", date: "SEP-15-1986", subject: "ELEVATOR REPAIR", body: "ELEVATOR 2 IS BACK IN SERVICE." },
        { folder: 'trash', from: "marketing@syntec.net", date: "SEP-10-1986", subject: "MUG SALE", body: "LAST CHANCE FOR SYNTEC MUGS!" }
    ];

    function renderList(folderName) {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const navItems = document.querySelectorAll('.nav-item');
        if (folderName === 'inbox') navItems[0].classList.add('active');
        if (folderName === 'starred') navItems[1].classList.add('active');
        if (folderName === 'sent') navItems[2].classList.add('active');
        if (folderName === 'trash') navItems[3].classList.add('active');

        const filtered = mails.filter(m => {
            if(folderName === 'starred') return m.starred === true;
            return m.folder === folderName;
        });

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const star = m.starred ? "[*]" : "[ ]";
            const sender = m.from.split('@')[0];
            const displaySub = m.subject.length > 25 ? m.subject.substring(0, 22) + "..." : m.subject;
            row.innerHTML = `${star} ${m.date} | ${sender} | ${displaySub}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });
        
        closeMessage();
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    renderList('inbox');
</script>
</body>
</html>
