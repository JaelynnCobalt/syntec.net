<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H0ME</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; font-size: 0.85rem;}
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { background: #1a551a; color: #33ff33; border: 1px solid #33ff33; }

        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }

        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }

        .message-head { font-size: 0.85rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.85rem; border-top: 1px dashed #33ff33; padding-top: 10px; color: #aaffaa; }
        
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.7rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.7rem;}
        .back-btn:hover { background: #33ff33; color: #000; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>SYNTEC S-MAIL V4.2</h1>
        <small>USER: JAELYNN COBALT [INT-LEVEL-3] | SECURE CONNECTION</small>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar-nav">
            <button id="btn-inbox" class="nav-item active" onclick="setView('inbox')">01. INBOX</button>
            <button id="btn-starred" class="nav-item" onclick="setView('starred')">02. STARRED</button>
            <button id="btn-sent" class="nav-item" onclick="setView('sent')">03. SENT</button>
            <button id="btn-trash" class="nav-item" onclick="setView('trash')">04. TRASH</button>
            <button class="nav-item" style="margin-top:20px" onclick="location.reload()">[ LOGOUT ]</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY</button>
                <button class="dead-btn">ARCHIVE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // INBOX & STARRED
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: DINNER", starred: false, body: "JAELYNN, DO NOT WAIT UP. THE CALIBRATION IN SECTOR 4 IS REQUIRING MY FULL ATTENTION. ENSURE YOUR LOGS ARE SUBMITTED BEFORE MIDNIGHT.\n\n- VATER" },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-27-1986", subject: "ACCESS LEVEL 3 GRANTED", starred: false, body: "YOUR CREDENTIALS HAVE BEEN UPDATED TO INTERN LEVEL 3. ACCESS TO PEGASUS SYSTEM ARCHIVES IS NOW ACTIVE." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-26-1986", subject: "DISAPPOINTMENT", starred: true, body: "I WAS INFORMED YOU WERE FOUND IN THE RESTRICTED WING. YOU ARE HERE TO LEARN, NOT TO WANDER. DO NOT EMBARRASS ME AGAIN.\n\n- VATER" },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-25-1986", subject: "LOG DEFICIENCIES", starred: false, body: "JAELYNN, YOUR REAGENT DATA FOR BATCH 863 IS INCOMPLETE. FIX THIS IMMEDIATELY." },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-24-1986", subject: "INTERNSHIP STATUS", starred: false, body: "PLEASE CONFIRM YOUR PARTICIPATION IN THE SPRING ROTATION BY FRIDAY." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-20-1986", subject: "PEGASUS PROGRESS", starred: true, body: "YOUR WORK ON THE RECOVERY ALGORITHM WAS ADEQUATE. PERHAPS THERE IS POTENTIAL IN YOU YET. KEEP WORKING.\n\n- VATER" },
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-18-1986", subject: "BADGE MALFUNCTION", starred: false, body: "REPORT TO SECURITY IF YOUR BADGE FAILS TO TRIGGER THE LEVEL 3 SCANNERS." },
        { folder: 'inbox', from: "lab.coord@syntec.net", date: "OCT-15-1986", subject: "LAB 4 CLEANUP", starred: false, body: "INTERNS ARE RESPONSIBLE FOR RE-SHELVING ALL DISKS AFTER THE 18:00 SHIFT." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "SEP-30-1986", subject: "ACADEMIC TRANSCRIPTS", starred: false, body: "SEND ME YOUR LATEST UNIVERSITY RESULTS. SYNTEC ONLY ACCEPTS THE HIGHEST CALIBER.\n\n- VATER" },
        { folder: 'inbox', from: "n.syphus@syntec.net", date: "SEP-25-1986", subject: "A NEW ERA", starred: true, body: "TO ALL PERSONNEL: THE WORK WE DO IN THE PEGASUS INITIATIVE WILL BE REMEMBERED FOR GENERATIONS. DISCRETION IS OUR STRENGTH." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "SEP-12-1986", subject: "GEBURTSTAG", starred: true, body: "ANOTHER YEAR HAS PASSED. I EXPECT SIGNIFICANT PROFESSIONAL GROWTH FROM YOU IN THIS NEW AGE. DO NOT WASTE YOUR TIME.\n\n- VATER" },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "SEP-05-1986", subject: "TERMINAL ASSIGNMENT", starred: false, body: "YOU HAVE BEEN ASSIGNED TO TERMINAL PEGASUS-04. DO NOT SHARE PASSWORDS." },
        { folder: 'inbox', from: "accounting@syntec.net", date: "SEP-01-1986", subject: "STIPEND UPDATE", starred: false, body: "INTERN STIPENDS WILL BE DISBURSED ON THE 15TH OF THE MONTH." },
        
        // SENT
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: DINNER", starred: false, body: "VATER, I HAVE SUBMITTED THE LOGS. I WILL BE AT THE DORM IF YOU NEED ME." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-26-1986", subject: "RE: DISAPPOINTMENT", starred: false, body: "I APOLOGIZE. IT WAS AN ERROR IN NAVIGATION. IT WON'T HAPPEN AGAIN." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-12-1986", subject: "LOG SUBMISSION BATCH 4", starred: false, body: "ALL DATA ENTRIES FOR THE 12:00 SHIFT COMPLETED." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "SEP-15-1986", subject: "QUESTION REGARDING LAB 4", starred: false, body: "VATER, WHY ARE THE SYPHUS SAMPLES KEPT IN A SEPARATE REFRIGERATION UNIT?" },
        
        // TRASH
        { folder: 'trash', from: "cafeteria@syntec.net", date: "OCT-10-1986", subject: "MENU UPDATE", starred: false, body: "THURSDAY IS NOW TACO DAY." },
        { folder: 'trash', from: "it.admin@syntec.net", date: "SEP-20-1986", subject: "SYSTEM REBOOT", starred: false, body: "THE MAINFRAME WILL BE DOWN FOR 10 MINUTES." },
        { folder: 'trash', from: "newsletter@syntec.net", date: "SEP-01-1986", subject: "WELCOME TO SYNTEC", starred: false, body: "WE ARE GLAD TO HAVE YOU ON THE TEAM." },
        { folder: 'trash', from: "w.nathanial@syntec.net", date: "AUG-28-1986", subject: "LATE ENTRY", starred: false, body: "YOU MISSED THE CUTOFF FOR THE ORIENTATION LOG." },
        { folder: 'trash', from: "facilities@syntec.net", date: "AUG-25-1986", subject: "LOCKER ASSIGNMENT", starred: false, body: "YOUR LOCKER IS #404." }
    ];

    let currentView = 'inbox';

    function setView(view) {
        currentView = view;
        closeMessage();
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + view).classList.add('active');
        renderList();
    }

    function renderList() {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        let filtered = mails;
        if (currentView === 'starred') {
            filtered = mails.filter(m => m.starred);
        } else {
            filtered = mails.filter(m => m.folder === currentView);
        }

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const star = m.starred ? "[*]" : "[ ]";
            row.innerHTML = `${star} ${m.date} | ${m.from.split('@')[0]} | ${m.subject}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });

        if(filtered.length === 0) {
            list.innerHTML = "<p style='color:#114411; padding: 10px;'>-- NO DATA IN DIRECTORY --</p>";
        }
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    renderList();
</script>
</body>
</html>
