<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYNTEC PEGASUS SYSTEM</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; }
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { border: 1px solid #33ff33; }

        /* Content Areas */
        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }

        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }

        /* Message Styles */
        .message-head { font-size: 0.9rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.9rem; border-top: 1px dashed #33ff33; padding-top: 10px; }
        
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.8rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .back-btn:hover { background: #33ff33; color: #000; }

        /* Scrollbar */
        .content-view::-webkit-scrollbar { width: 8px; }
        .content-view::-webkit-scrollbar-track { background: #000; }
        .content-view::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>SYNTEC S-MAIL V4.1</h1>
        <small>USER: JAELYNN COBALT [INT-LEVEL-3] | TERMINAL: PEGASUS-04</small>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar-nav">
            <button class="nav-item active" onclick="filterMail('inbox')">01. INBOX</button>
            <button class="nav-item" onclick="filterMail('starred')">02. STARRED</button>
            <button class="nav-item" onclick="filterMail('sent')">03. SENT</button>
            <button class="nav-item" onclick="filterMail('trash')">04. TRASH</button>
            <button class="nav-item" style="margin-top:20px" onclick="location.reload()">[ LOGOUT ]</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-to">TO: j.cobalt@syntec.net</p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY [LOCKED]</button>
                <button class="dead-btn">FORWARD [LOCKED]</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // INBOX
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: DINNER TONIGHT", starred: true, body: "JAELYNN, I'LL BE LATE LEAVING LAB 4. DON'T WAIT UP. PLEASE FINISH YOUR FILING TASKS BEFORE YOU LEAVE THE WORKSTATION. \n\n- DAD" },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-27-1986", subject: "INTERN ACCESS LEVEL 3", body: "YOUR REQUEST FOR SECONDARY DRIVE ACCESS HAS BEEN APPROVED. DO NOT SHARE YOUR CREDENTIALS WITH OTHER INTERNS." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-26-1986", subject: "STAY AWAY FROM LEVEL 4", body: "I SAW YOUR BADGE LOGGED IN THE NORTH WING STAIRWELL. THERE IS NO REASON FOR AN INTERN TO BE IN THAT SECTOR. STAY IN THE PEGASUS LABS." },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-25-1986", subject: "QUARTERLY REVIEW", body: "PLEASE SUBMIT YOUR INTERNSHIP PROGRESS REPORT TO MR. NATHANIAL BY FRIDAY." },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-24-1986", subject: "LOG ENTRIES", body: "JAELYNN, YOUR LAST THREE LOG ENTRIES WERE INCOMPLETE. SYNTEC REQUIRES FULL DOCUMENTATION OF REAGENT TEMPERATURES." },
        
        // SENT
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: DINNER TONIGHT", body: "OKAY. I'M FINISHING THE PEGASUS LOGS NOW. SEE YOU AT HOME." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-26-1986", subject: "RE: STAIRWELL", body: "I WAS JUST TAKING THE SHORTCUT TO THE BREAKROOM. I WON'T DO IT AGAIN." },
        
        // STARRED
        { folder: 'starred', from: "b.cobalt@syntec.net", date: "SEP-12-1986", subject: "HAPPY BIRTHDAY", body: "PROUD OF THE WORK YOU ARE DOING HERE. JUST KEEP YOUR HEAD DOWN AND FOLLOW PROTOCOL. \n\n- DAD" },
        
        // TRASH
        { folder: 'trash', from: "newsletter@syntec.net", date: "OCT-10-1986", subject: "SYNTEC SOCIAL MIXER", body: "JOIN US FOR THE BI-ANNUAL SOCIAL. (REMOVED BY USER)" },
        { folder: 'trash', from: "it.admin@syntec.net", date: "OCT-01-1986", subject: "DISK QUOTA EXCEEDED", body: "PLEASE CLEAR YOUR TEMP FILES IMMEDIATELY." }
    ];

    let currentFolder = 'inbox';

    function filterMail(folder) {
        currentFolder = folder;
        closeMessage();
        
        // Update Sidebar UI
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        renderList();
    }

    function renderList() {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        const filtered = mails.filter(m => m.folder === folderMapper(currentFolder));

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const prefix = m.starred ? "[*]" : "[ ]";
            row.innerHTML = `${prefix} ${m.date} | ${m.from.split('@')[0]} | ${m.subject}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });

        if(filtered.length === 0) {
            list.innerHTML = "<p style='color:#114411'>-- NO MESSAGES FOUND --</p>";
        }
    }

    // Maps UI buttons to data folders
    function folderMapper(nav) {
        if(nav === 'starred') return 'inbox'; // Starred are usually in inbox
        return nav;
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    // Initial Load
    renderList();
</script>
</body>
</html>
