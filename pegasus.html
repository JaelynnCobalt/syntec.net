<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PEGASUS SYSTEM</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; }
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { border: 1px solid #33ff33; background: rgba(51, 255, 51, 0.1); }

        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }

        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }

        .message-head { font-size: 0.85rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.85rem; border-top: 1px dashed #33ff33; padding-top: 10px; }
        
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.8rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .back-btn:hover { background: #33ff33; color: #000; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>SYNTEC S-MAIL V4.1</h1>
        <small>USER: J. =13 [INT-LEVEL-3] | SECURE CONNECTION</small>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar-nav">
            <button class="nav-item active" onclick="setFolder('inbox')">01. INBOX</button>
            <button class="nav-item" onclick="setFolder('starred')">02. IMPORTANT</button>
            <button class="nav-item" onclick="setFolder('sent')">03. SENT</button>
            <button class="nav-item" onclick="setFolder('trash')">04. TRASH</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY]</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // PSYCH EVAL CHAIN (LORE FOCUS)
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: PSYCH EVALUATION RESULTS", starred: true, body: "[REDACTED], I HAVE REVIEWED THE CLINICAL SUMMARY FROM DR. HILL. \n\nNOTES: 'SUBJECT EXHIBITS SIGNIFICANT HYPER-FIXATION ON COMPUTATIONAL LOGIC. SOCIAL WITHDRAWAL IS NOTED AS A DEFICIT, BUT FUNCTIONAL FOR SYNTEC ENVIRONMENTS.' \n\nWE WILL DISCUSS THE ADJUSTMENT TO YOUR WORK HOURS TONIGHT. \n\n- -B27" },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-28-1986", subject: "RE: PSYCH EVALUATION RESULTS", body: "DOES THIS MEAN I CAN STAY IN THE PEGASUS LAB LONGER? I FIND THE CALIBRATION TASKS MORE LOGICAL THAN THE SOCIAL ROTATIONS IN HR." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-27-1986", subject: "PSYCH EVALUATION RESULTS", body: "THE EVALUATION IS MERELY TO ENSURE PROPER PLACEMENT WITHIN SYNTEC. DO NOT OVER-ANALYZE THE TERMINOLOGY REGARDING 'ATYPICAL COGNITION.' IT IS AN ASSET HERE." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-27-1986", subject: "PSYCH EVALUATION RESULTS", body: "DR. HILL ASKED MANY REPETITIVE QUESTIONS. I FOUND IT INEFFICIENT. WILL THIS AFFECT MY LEVEL 3 STATUS?" },

        // WORK / MUNDANE
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-26-1986", subject: "DISK DRIVE ERROR - TERMINAL 04", body: "SYSTEM DETECTED A READ/WRITE ERROR ON DRIVE B. PLEASE SUBMIT YOUR FLOPPY DISKS FOR DE-MAGNETIZATION CHECK." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-25-1986", subject: "STAIRWELL ACCESS", starred: true, body: "REMINDER: THE NORTH STAIRWELL IS FOR LEVEL 4 CLEARANCE ONLY. EVEN IF THE PATH IS MATHEMATICALLY SHORTER TO THE COMMISSARY, YOU MUST USE THE MAIN HALLWAY." },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-24-1986", subject: "LOG COMPLETION", body: "JAELYNN, ENSURE ALL TEMPERATURE READINGS ARE RECORDED TO THE FOURTH DECIMAL POINT. PRECISION IS NOT OPTIONAL." },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-23-1986", subject: "INTERN WORKSHOP", body: "MANDATORY WORKSHOP: 'EFFECTIVE TEAM COMMUNICATION'. 14:00 HOURS. ROOM 2B." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-23-1986", subject: "RE: INTERN WORKSHOP", body: "W. NATHANIAL, I HAVE A CONFLICT WITH THE PEGASUS COOLANT CYCLE. I CANNOT ATTEND THE COMMUNICATION WORKSHOP." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-22-1986", subject: "RE: COOLANT CYCLE", body: "I HAVE HANDLED THE WORKSHOP EXEMPTION. FOCUS ON THE COOLANT. IT IS A BETTER USE OF YOUR TEMPERAMENT." },
        
        // STARRED / PERSONAL
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "SEP-12-1986", subject: "SUPPLY UPDATE", starred: true, body: "[REDACTED], I HAVE DEPOSITED ADDITIONAL CREDITS INTO YOUR COMMISSARY ACCOUNT. THE NEW GRAPHING CALCULATOR YOU REQUESTED HAS ARRIVED AT MY OFFICE. \n\n- "-B27 },
        
        // ADDITIONAL MUNDANE (15-25 range)
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-20-1986", subject: "LAB COAT LAUNDRY", body: "LAB COATS DROPPED OFF AFTER WEDNESDAY WILL NOT BE READY UNTIL THE FOLLOWING MONDAY." },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-18-1986", subject: "TERMINAL TIME-OUTS", body: "IDLE TERMINALS WILL BE LOGGED OFF AFTER 5 MINUTES TO CONSERVE MAINFRAME POWER." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-15-1986", subject: "REQUISITION: NEW PENCILS", body: "THE CURRENT PENCILS PROVIDED ARE 2H. I REQUIRE 4H FOR FINER LOG DETAIL. PLEASE ADVISE." },
        { folder: 'inbox', from: "procurement@syntec.net", date: "OCT-16-1986", subject: "RE: REQUISITION: NEW PENCILS", body: "4H PENCILS ARE SPECIAL ORDER. EXPECT DELIVERY IN 14 DAYS." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-12-1986", subject: "DATA REVIEW", body: "YOUR DATA ENTRY ON THE SODIUM TRIALS WAS FLAWLESS. NO ERRORS. EXCELLENT WORK." },
        { folder: 'inbox', from: "security@syntec.net", date: "OCT-10-1986", subject: "UNAUTHORIZED DISKETTE", body: "A NON-SYNTEC BRAND DISKETTE WAS FOUND NEAR YOUR STATION. PLEASE REPORT TO SECURITY FOR IDENTIFICATION." },
        { folder: 'sent', from: "j.13@syntec.net", date: "OCT-10-1986", subject: "RE: UNAUTHORIZED DISKETTE", body: "THAT WAS MY MATHEMATICAL THEOREM DISK. IT IS NOT UNAUTHORIZED. I WILL RETRIEVE IT." },
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-05-1986", subject: "VENDING MACHINE UPDATE", body: "THE VENDING MACHINE IN SECTOR B NOW CARRIES PROTEIN BARS. NO REFUNDS FOR JAMMED ITEMS." },
        { folder: 'trash', from: "newsletter@syntec.net", date: "OCT-01-1986", subject: "OCTOBER NEWS", body: "WELCOME TO THE NEW QUARTER... [REMOVED]" },
        { folder: 'trash', from: "it.admin@syntec.net", date: "SEP-25-1986", subject: "TEST MESSAGE", body: "IGNORE THIS MESSAGE. SYSTEM TEST." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "SEP-20-1986", subject: "DESK ORGANIZATION", body: "I NOTICED YOUR WORKSTATION. THE PERPENDICULAR ALIGNMENT OF YOUR EQUIPMENT IS IMPROVING EFFICIENCY. CONTINUE THIS." }
    ];

    let currentFolder = 'inbox';

    function setFolder(folder) {
        currentFolder = folder;
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        // Find the button and make it active
        const navs = document.querySelectorAll('.nav-item');
        if(folder==='inbox') navs[0].classList.add('active');
        if(folder==='starred') navs[1].classList.add('active');
        if(folder==='sent') navs[2].classList.add('active');
        if(folder==='trash') navs[3].classList.add('active');
        
        closeMessage();
        renderList();
    }

    function renderList() {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        let filtered = mails;
        if(currentFolder === 'starred') {
            filtered = mails.filter(m => m.starred === true);
        } else {
            filtered = mails.filter(m => m.folder === currentFolder);
        }

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const star = m.starred ? "[*]" : "[ ]";
            const sender = m.from.split('@')[0];
            row.innerHTML = `${star} ${m.date} | ${sender.padEnd(12)} | ${m.subject}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });

        if(filtered.length === 0) {
            list.innerHTML = "<p style='color:#114411; padding: 20px;'>-- NO DATA IN DIRECTORY --</p>";
        }
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    renderList();
</script>
</body>
</html>
