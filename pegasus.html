<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HoM3</title>
    <style>
        body {
            background-color: #000;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .crt-monitor {
            position: relative;
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            padding: 20px;
            border: 15px solid #2a2a2a;
            border-radius: 40px;
            background: #050505;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
        }

        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header { border-bottom: 2px solid #33ff33; padding-bottom: 5px; margin-bottom: 10px; flex-shrink: 0; }
        
        .main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        .sidebar { width: 180px; border-right: 1px solid #1a551a; padding-right: 10px; flex-shrink: 0; }
        .nav-item { padding: 8px; cursor: pointer; display: block; width: 100%; text-align: left; background: transparent; color: #33ff33; border: none; font-family: inherit; }
        .nav-item:hover { background: #33ff33; color: #000; }
        .nav-item.active { border: 1px solid #33ff33; }

        .content-view { flex-grow: 1; padding-left: 15px; overflow-y: auto; position: relative; }
        .hidden { display: none; }

        .mail-row { border-bottom: 1px solid #1a551a; padding: 10px 5px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-row:hover { background: rgba(51, 255, 51, 0.1); }

        .message-head { font-size: 0.85rem; margin-bottom: 15px; }
        .message-body { line-height: 1.4; white-space: pre-wrap; font-size: 0.85rem; border-top: 1px dashed #33ff33; padding-top: 10px; }
        
        .btn-row { margin-top: 20px; display: flex; gap: 10px; }
        .dead-btn { border: 1px solid #114411; color: #114411; padding: 5px 10px; cursor: not-allowed; font-size: 0.8rem; }
        .back-btn { border: 1px solid #33ff33; color: #33ff33; background: transparent; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .back-btn:hover { background: #33ff33; color: #000; }

        .content-view::-webkit-scrollbar { width: 8px; }
        .content-view::-webkit-scrollbar-track { background: #000; }
        .content-view::-webkit-scrollbar-thumb { background: #33ff33; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="header">
        <h1>SYNTEC S-MAIL V4.1</h1>
        <small>USER: JAELYNN COBALT [INT-LEVEL-3] | DEPT: PEGASUS-A</small>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <button class="nav-item active" id="btn-inbox" onclick="setFolder('inbox')">01. INBOX</button>
            <button class="nav-item" id="btn-starred" onclick="setFolder('starred')">02. STARRED</button>
            <button class="nav-item" id="btn-sent" onclick="setFolder('sent')">03. SENT</button>
            <button class="nav-item" id="btn-trash" onclick="setFolder('trash')">04. TRASH</button>
            <button class="nav-item" style="margin-top:20px" onclick="location.reload()">[ LOGOFF ]</button>
        </div>

        <div class="content-view" id="list-view">
            <div id="mail-list"></div>
        </div>

        <div class="content-view hidden" id="message-view">
            <div class="message-head">
                <p id="m-from"></p>
                <p id="m-subj"></p>
                <p id="m-date"></p>
            </div>
            <div class="message-body" id="m-body"></div>
            <div class="btn-row">
                <button class="back-btn" onclick="closeMessage()">[ ESC ] BACK</button>
                <button class="dead-btn">REPLY [LOCKED]</button>
            </div>
        </div>
    </div>
</div>

<script>
    const mails = [
        // STARRED
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: EVALUATION RECORDS", starred: true, body: "JAELYNN, I HAVE RETRIEVED THE PSYCHOMETRIC FILINGS FROM 1982. YOUR PROFILE REMAINS STABLE. 'FIXATION ON SYSTEMIC LOGIC' IS LISTED AS A STRENGTH IN THE PEGASUS PROJECT CONTEXT. DO NOT LET THE HR ASSESSMENT OF 'SOCIAL DEFICIT' DISTRACT YOU. LOGIC IS OUR VIRTUE. \n\n- ABBA" },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-26-1986", subject: "PEGASUS ALIGNMENT DATA", starred: true, body: "THE SENSORS ARE WITHIN 0.003 PERCENT VARIANCE. YOUR PRECISION IS UNMATCHED BY THE OTHER INTERNS. I HAVE STARRED THIS FOR YOUR REVIEW. \n\n- ABBA" },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-15-1986", subject: "ENCRYPTION KEY OVERRIDE", starred: true, body: "KEEP THIS KEY SECURE: 863-B-COBALT. THIS ALLOWS BYPASS OF THE SUB-SYSTEM LOCKOUT IN LAB 4." },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-01-1986", subject: "PROMOTION NOTICE", starred: true, body: "JAELYNN, BASED ON YOUR EFFICIENCY WITH THE LOG SYSTEMS, YOU ARE MOVED TO LEVEL 3 INTERN STATUS EFFECTIVE IMMEDIATELY." },

        // INBOX CHAINS
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: RE: RE: NOISE LEVELS", body: "I AGREE. THE VENTILATION IN SECTOR B IS AT 45 DECIBELS. I HAVE FILED A WORK ORDER TO HAVE THE FAN LUBRICATED. IT IS INTERFERING WITH CONCENTRATION. \n\n- ABBA" },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-27-1986", subject: "NOISE LEVELS", body: "ARE YOU FINDING THE LAB NOISE TOLERABLE TODAY? I NOTICED YOU WERE WEARING YOUR EAR DEFLECTORS EARLY. \n\n- ABBA" },
        { folder: 'inbox', from: "hr.dept@syntec.net", date: "OCT-25-1986", subject: "MANDATORY SOCIAL MIXER", body: "ATTENDANCE IS REQUESTED FOR THE QUARTERLY INTERN LUNCHEON. PLEASE PREPARE A 2-MINUTE SPEECH ON YOUR WORK." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-25-1986", subject: "RE: LUNCHEON", body: "IF THE LUNCHEON IS TOO STIMULATING, YOU MAY USE THE CALIBRATION ROOM AS AN EXCUSE TO LEAVE EARLY. I WILL SIGN THE PERMISSION SLIP. \n\n- ABBA" },
        { folder: 'inbox', from: "w.nathanial@syntec.net", date: "OCT-24-1986", subject: "LOG DISCREPANCY", body: "YOU LOGGED 402 ENTRIES TODAY. THE AVERAGE IS 150. PLEASE ENSURE YOU ARE NOT OVER-SPECIFYING THE DATA." },
        { folder: 'inbox', from: "facilities@syntec.net", date: "OCT-23-1986", subject: "LAB LIGHTING", body: "THE REQUEST TO DIM THE LIGHTS IN LAB 3 HAS BEEN DENIED DUE TO SAFETY REGULATIONS." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-22-1986", subject: "EVALUATION PREP", body: "DR. SYPHUS IS LOOKING AT THE COGNITIVE PROFILES AGAIN. STAY FOCUSED ON THE DATA. THE DATA IS SAFE. \n\n- ABBA" },
        { folder: 'inbox', from: "it.admin@syntec.net", date: "OCT-20-1986", subject: "TERMINAL REBOOT", body: "SYSTEM MAINTENANCE IN 10 MINUTES. SAVE ALL ACTIVE BUFFERS." },
        { folder: 'inbox', from: "lab.coord@syntec.net", date: "OCT-19-1986", subject: "RE: REAGENT 4", body: "PLEASE STOP COLOR-CODING THE BEAKERS. IT IS NOT PART OF THE STANDARD OPERATING PROCEDURE." },
        { folder: 'inbox', from: "b.cobalt@syntec.net", date: "OCT-18-1986", subject: "DINNER SEQUENCE", body: "MONDAY: FISH. TUESDAY: PASTA. WEDNESDAY: CHICKEN. WE WILL NOT DEVIATE THIS WEEK. \n\n- ABBA" },
        
        // SENT
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-28-1986", subject: "RE: RE: NOISE LEVELS", body: "THANK YOU. THE CLICKING SOUND FROM THE FAN WAS OCCURRING EVERY 4.2 SECONDS. IT MADE DATA ENTRY DIFFICULT." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-28-1986", subject: "EVALUATION RECORDS", body: "ABBA, CAN YOU FIND MY 1982 PSYCH EVAL? I NEED TO SEE THE NOTES ON 'OBJECT PERMANENCE' FOR MY PROJECT." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-25-1986", subject: "LUNCHEON", body: "ABBA, THE LUNCHEON HAS TOO MANY PEOPLE. I WOULD PREFER TO STAY IN THE LAB." },
        { folder: 'sent', from: "j.cobalt@syntec.net", date: "OCT-20-1986", subject: "BEAKER CODING", body: "THE COLORS MAKE THE RETRIEVAL PROCESS 12% FASTER. I DO NOT UNDERSTAND THE OBJECTION." },
        
        // TRASH
        { folder: 'trash', from: "marketing@syntec.net", date: "OCT-05-1986", subject: "SYNTEC BRANDING", body: "NEW POSTERS ARE BEING INSTALLED IN THE LOBBY." },
        { folder: 'trash', from: "hr.dept@syntec.net", date: "SEP-30-1986", subject: "TEAM BUILDING EXERCISE", body: "JOIN US FOR A GROUP HIKE ON SATURDAY." }
    ];

    let currentFolder = 'inbox';

    function setFolder(folder) {
        currentFolder = folder;
        closeMessage();
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + folder).classList.add('active');
        renderList();
    }

    function renderList() {
        const list = document.getElementById('mail-list');
        list.innerHTML = "";
        
        let filtered = mails;
        if (currentFolder === 'starred') {
            filtered = mails.filter(m => m.starred === true);
        } else {
            filtered = mails.filter(m => m.folder === currentFolder);
        }

        filtered.forEach((m) => {
            const row = document.createElement('div');
            row.className = "mail-row";
            const star = m.starred ? "[*]" : "[ ]";
            const sender = m.from.split('@')[0];
            row.innerHTML = `${star} ${m.date} | ${sender.padEnd(12)} | ${m.subject}`;
            row.onclick = () => openMessage(m);
            list.appendChild(row);
        });

        if(filtered.length === 0) {
            list.innerHTML = "<p style='color:#114411'>-- NO RECORDS FOUND --</p>";
        }
    }

    function openMessage(msg) {
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('message-view').classList.remove('hidden');
        document.getElementById('m-from').textContent = "FROM: " + msg.from;
        document.getElementById('m-subj').textContent = "SUBJ: " + msg.subject;
        document.getElementById('m-date').textContent = "DATE: " + msg.date;
        document.getElementById('m-body').textContent = msg.body;
    }

    function closeMessage() {
        document.getElementById('message-view').classList.add('hidden');
        document.getElementById('list-view').classList.remove('hidden');
    }

    renderList();
</script>
</body>
</html>
