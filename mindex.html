<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntec Terminal </title>

    <style>
        :root {
            --syntec-green: #33ff33;
            --bg-black: #050505;
        }

        body {
            background-color: #000;
            color: var(--syntec-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
        }

        /* CRT Overlay - Subtle for Mobile */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 10;
        }

        .screen {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border: 1px solid var(--syntec-green);
            margin: 5px;
            box-sizing: border-box;
            background: var(--bg-black);
        }

        #output {
            flex-grow: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .input-area {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid var(--syntec-green);
            background: var(--bg-black);
        }

        #label {
            font-size: 1rem;
            white-space: nowrap;
        }

        #command-line {
            background: transparent;
            border: none;
            color: var(--syntec-green);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            width: 100%;
            caret-color: var(--syntec-green);
        }

        .loading-bar {
            margin-top: 10px;
            word-break: break-all;
            font-size: 1.2rem;
        }

        p { margin: 5px 0; }

        /* Animation for loading */
        .blink { animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>

<body>

<div class="crt-overlay"></div>

<div class="screen">
    <div id="output">
        <p>SYNTEC(TM) PEGASUS OS v2.0.1m</p>
        <p>MOBILE UPLINK ESTABLISHED</p>
        <p>---------------------------</p>
        <p>PLEASE LOG IN TO PROCEED...</p>
    </div>

    <div class="input-area" id="input-zone">
        <span id="label">EMPLOYEE ID: </span>
        <input type="text" id="command-line" autofocus autocomplete="off" inputmode="text">
    </div>
</div>

<script>
    const input = document.getElementById('command-line');
    const output = document.getElementById('output');
    const label = document.getElementById('label');
    const inputZone = document.getElementById('input-zone');

    let stage = 0; // 0: ID, 1: Command, 2: Status, 3: Choice
    let locked = false;

    function typeLine(text, speed = 20) {
        return new Promise(resolve => {
            const p = document.createElement('p');
            output.appendChild(p);
            let i = 0;
            function type() {
                if (i < text.length) {
                    p.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }
            }
            type();
        });
    }

    function normalize(str) {
        return str.toLowerCase().replace(/[^\w\s]/g, '').trim();
    }

    async function showLoadingBar(type) {
        locked = true;
        inputZone.style.display = "none";
        output.innerHTML = "";
        
        if (type === "mountaineer") {
            await typeLine("ACCESSING n3s.dsk...", 40);
        } else {
            await typeLine("INITIALIZING CLINICAL INTERFACE...", 40);
        }
        
        const bar = document.createElement('div');
        bar.className = "loading-bar";
        bar.textContent = "[";
        output.appendChild(bar);

        for (let i = 0; i < 15; i++) {
            await new Promise(r => setTimeout(r, 150));
            bar.textContent += "■";
            output.scrollTop = output.scrollHeight;
        }
        bar.textContent += "]";
        
        await typeLine("REDIRECTING...", 30);
        await new Promise(r => setTimeout(r, 800));
        
        // Redirecting to mobile versions or standard (ensure your other pages exist)
        window.location.href = (type === "mountaineer") ? "n3s.html" : "clinical-practice.html";
    }

    input.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter' && !locked) {
            locked = true;
            const cmd = input.value.trim();
            const norm = normalize(cmd);
            
            // Mask password if we were at a password stage (optional addition)
            await typeLine("> " + (stage === 1.5 ? "****" : cmd), 10);
            input.value = '';
            
            await processInput(cmd, norm);
            locked = false;
        }
    });

    async function processInput(cmd, norm) {
        // Stage 0: Any 5-digit Employee ID
        if (stage === 0) {
            const idPattern = /^\d{5}$/;
            if (idPattern.test(cmd)) {
                await typeLine("ID VERIFIED. ENTER PASSWORD.", 30);
                label.textContent = "PASSWORD: ";
                input.type = "password";
                stage = 1.5; // Intermediate password stage
            } else {
                await typeLine("ERROR: ID MUST BE 5 DIGITS.", 30);
            }
        } 
        // Stage 1.5: Any Password accepts
        else if (stage === 1.5) {
            await typeLine("ACCESS GRANTED.", 30);
            label.textContent = "COMMAND: ";
            input.type = "text";
            stage = 1;
            await typeLine("WELCOME TO PEGASUS MOBILE.", 30);
            await typeLine("TYPE 'DIR' FOR MODULES.", 30);
        }
        // Stage 1: Directory Commands
        else if (stage === 1) {
            if (norm === "dir" || norm === "directory") {
                await typeLine("--- DIRECTORY ---", 20);
                await typeLine("[CLINICAL]", 20);
                await typeLine("[STATUS]", 20);
            } 
            else if (norm === "clinical") {
                await showLoadingBar("clinical");
            }
            else if (norm === "mountaineer") {
                await showLoadingBar("mountaineer");
            }
            else if (norm === "status") {
                await typeLine("LOG: BREAKROOM REPLENISHMENT REQUIRED.", 30);
                stage = 2;
                label.textContent = "QUERY: ";
            }
            else {
                await typeLine("ERROR: UNKNOWN COMMAND.", 30);
            }
        }
        // Stage 2 & 3: The coffee/vanilla logic
        else if (stage === 2) {
            if (norm.includes("vanilla")) {
                await typeLine("UNAVAILABLE. SELECT: [HAZELNUT] OR [PEPPERMINT]", 30);
                stage = 3;
                label.textContent = "SELECT: ";
            } else {
                await typeLine("INVALID QUERY.", 30);
            }
        }
        else if (stage === 3) {
            if (norm === "hazelnut") {
                window.location.href = "smail.html";
            } else if (norm === "peppermint") {
                window.location.href = "863.html";
            } else {
                await typeLine("SELECTION NOT RECOGNIZED.", 30);
            }
        }
    }
</script>

</body>
</html>
