<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syntec Terminal </title>

    <style>
        :root {
            --neon-green: #33ff33;
            --bg-black: #050505;
        }

        body {
            background-color: #0a0a0a;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* CRT Scanline Effect optimized for mobile performance */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 10;
        }

        .screen {
            width: 95%; /* Use more width on mobile */
            height: 90vh;
            padding: 15px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.2);
            background: var(--bg-black);
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 1rem; /* Slightly smaller for mobile fitting */
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .input-area {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--dark-green);
            padding-top: 10px;
        }

        #command-line {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            width: 100%;
            caret-color: var(--neon-green); /* Visual cursor */
        }

        .loading-bar {
            color: var(--neon-green);
            word-break: break-all;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Prevent auto-zoom on iPhone */
        input:focus {
            font-size: 16px !important;
        }

        #chat-log::-webkit-scrollbar { width: 3px; }
        #chat-log::-webkit-scrollbar-thumb { background: var(--dark-green); }
    </style>
</head>

<body>

<div class="crt-overlay"></div>

<div class="screen">
    <div id="output">
        <p>SYNTEC(TM) PEGASUS OS v2.0.1</p>
        <p>USER DETECTED...</p>
        <p>---------------------------</p>
        <p>PLEASE LOG IN TO PROCEED...</p>
    </div>

    <div class="input-area" id="input-zone">
        <span id="label">ID: </span>
        <input type="text" id="command-line" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
    const input = document.getElementById('command-line');
    const output = document.getElementById('output');
    const label = document.getElementById('label');
    const inputZone = document.getElementById('input-zone');

    let stage = 0; // 0: ID, 1: Password, 2: Command, 3: Status, 4: Select
    let locked = false;

    function typeLine(text, speed = 20) {
        return new Promise(resolve => {
            const p = document.createElement('p');
            output.appendChild(p);
            let i = 0;
            function type() {
                if (i < text.length) {
                    p.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }
            }
            type();
        });
    }

    function normalize(str) {
        return str.toLowerCase().replace(/[^\w\s]/g, '').trim();
    }

    // Function to check if input is purely alphanumeric (no special chars)
    function isValid(str) {
        return /^[a-zA-Z0-9]+$/.test(str);
    }

    async function showLoadingBar(type = "clinical") {
        locked = true;
        inputZone.style.display = "none";
        output.innerHTML = "";
        
        if (type === "mountaineer") {
            await typeLine("ACCESSING HIDDEN DIRECTORY...", 40);
            await typeLine("MOUNTING VOLUME: n3s.dsk", 40);
        } else {
            await typeLine("INITIALIZING CLINICAL INTERFACE...", 40);
            await typeLine("MOUNTING DATABASE: J13-V8.4", 40);
        }
        
        await typeLine("ESTABLISHING MOBILE UPLINK...", 60);
        
        const bar = document.createElement('div');
        bar.className = "loading-bar";
        bar.textContent = "[";
        output.appendChild(bar);

        const segments = 15;
        for (let i = 0; i < segments; i++) {
            await new Promise(r => setTimeout(r, 150));
            bar.textContent += "■";
            output.scrollTop = output.scrollHeight;
        }
        bar.textContent += "]";
        
        await new Promise(r => setTimeout(r, 500));
        await typeLine("CONNECTION ESTABLISHED. REDIRECTING...", 30);
        await new Promise(r => setTimeout(r, 1000));
        
        window.location.href = (type === "mountaineer") ? "mn3s.html" : "mclinical-practice.html";
    }

    input.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter' && !locked) {
            locked = true;
            const cmd = input.value.trim();
            const norm = normalize(input.value);
            
            // Mask password in output
            const displayCmd = (stage === 1) ? "****" : cmd;
            await typeLine("> " + displayCmd, 10);
            input.value = '';

            await processInput(cmd, norm);
            locked = false;
        }
    });

    async function processInput(cmd, norm) {
        switch(stage) {
            case 0: // Employee ID Stage
                if (isValid(cmd)) {
                    await typeLine("ID VERIFIED. REQUESTING ACCESS KEY...", 30);
                    label.textContent = "PASSWORD: ";
                    input.type = "password";
                    stage = 1;
                } else {
                    await typeLine("ERROR: ID CONTAINS ILLEGAL CHARACTERS.", 30);
                }
                break;

            case 1: // Password Stage
                if (isValid(cmd)) {
                    await typeLine("ACCESS GRANTED. WELCOME TO PEGASUS", 30);
                    await typeLine("TYPE 'DIR' FOR MODULE LIST.", 30);
                    label.textContent = "COMMAND: ";
                    input.type = "text";
                    stage = 2;
                } else {
                    await typeLine("ERROR: INVALID ACCESS KEY.", 30);
                }
                break;

            case 2: // Directory Stage
                if (norm === "dir" || norm === "directory") {
                    await typeLine("--- SYSTEM DIRECTORY ---", 20);
                    await typeLine("> [CLINICAL] - INTERN EVALUATION", 20);
                    await typeLine("> [STATUS]   - FACILITY REPORT", 20);
                    await typeLine("------------------------", 20);
                } 
                else if (norm === "clinical") {
                    await showLoadingBar("clinical");
                }
                else if (norm === "mountaineer") {
                    await showLoadingBar("mountaineer");
                }
                else if (norm === "status") {
                    await typeLine("ACCESSING STATUS REPORTS...", 30);
                    await typeLine("LOG: THEY'RE OUT OF CREAM IN THE BREAKROOM", 30);
                    stage = 3;
                    label.textContent = "QUERY: ";
                }
                else {
                    await typeLine("ERROR: COMMAND NOT RECOGNIZED", 30);
                }
                break;

            case 3: // Status Query Stage
                if (norm.includes("regular") || norm.includes("vanilla")) {
                    await typeLine("VANILLA UNAVAILABLE. SELECT ALTERNATE:", 30);
                    await typeLine("> HAZELNUT", 30);
                    await typeLine("> PEPPERMINT", 30);
                    stage = 4;
                    label.textContent = "SELECT: ";
                } else {
                    await typeLine("INVALID STATUS QUERY.", 30);
                }
                break;

            case 4: // Coffee Choice Stage
                if (norm === "hazelnut") {
                    await typeLine("ORDER CONFIRMED. REDIRECTING TO S-MAIL...", 30);
                    window.location.href = "msmail.html";
                }
                else if (norm === "peppermint") {
                    await typeLine("ORDER CONFIRMED. REDIRECTING TO 863 SECURE...", 30);
                    window.location.href = "863.html";
                }
                break;
        }
    }
</script>

</body>
</html>
