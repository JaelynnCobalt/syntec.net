<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntec Mail - Encrypted Communication</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #33ff33; --bg: #050505; --panel: #0d0d0d; --border: #1a3a1a; --dim: #1a5a1a; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .top-bar { padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .main { display: flex; flex: 1; overflow: hidden; }

        /* Folders Sidebar */
        .folder-sidebar { width: 180px; border-right: 1px solid var(--border); background: #000; padding-top: 20px; }
        .folder-item { padding: 12px 20px; font-size: 0.8rem; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .folder-item:hover { opacity: 1; background: rgba(51, 255, 51, 0.05); }
        .folder-item.active { opacity: 1; color: #fff; border-left: 3px solid var(--neon); background: rgba(51, 255, 51, 0.1); }

        /* Inbox List */
        .inbox-sidebar { width: 320px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--panel); }
        .mail-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; position: relative; }
        .mail-item:hover { background: rgba(51, 255, 51, 0.05); }
        .mail-item.active { background: rgba(51, 255, 51, 0.1); }
        .mail-sender { font-weight: bold; font-size: 0.85rem; display: block; color: #fff; }
        .mail-preview { font-size: 0.7rem; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
        .star-indicator { position: absolute; right: 10px; top: 15px; color: yellow; font-size: 0.8rem; }

        /* Message Viewer */
        .content-area { flex: 1; display: flex; flex-direction: column; padding: 40px; background: #080808; overflow-y: auto; border-left: 1px solid var(--border); }
        .email-header { border-bottom: 1px solid var(--border); margin-bottom: 20px; padding-bottom: 20px; }
        .email-body { line-height: 1.6; font-size: 0.9rem; white-space: pre-wrap; color: #ccc; }

        /* Compose Modal */
        #compose-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel); border: 2px solid var(--neon); padding: 30px; width: 550px; }
        .modal-content input, .modal-content textarea { width: 100%; background: #000; border: 1px solid var(--dim); color: var(--neon); padding: 10px; font-family: inherit; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        
        /* New Custom Notification Toast */
        #terminal-notify { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #000; border: 1px solid var(--neon); 
            padding: 15px 25px; color: var(--neon); 
            font-size: 0.8rem; z-index: 1000; 
            display: none; box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-ghost { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 8px 15px; cursor: pointer; font-family: inherit; }
        .btn-ghost:hover { background: var(--neon); color: #000; }
        #compose-btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-right: 20px; }
    </style>
</head>
<body>

<div id="terminal-notify"></div>

<div id="compose-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; letter-spacing: 2px;">SECURE UPLINK: COMPOSE</h3>
        <label style="font-size:0.6rem; display:block; margin-bottom:5px;">TO: (EMPLOYEE_ID)</label>
        <input type="text" id="mail-to">
        <label style="font-size:0.6rem; display:block; margin-bottom:5px;">TRANSMISSION CONTENT</label>
        <textarea id="mail-body"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn-ghost" style="flex:1" onclick="sendMail()">TRANSMIT</button>
            <button class="btn-ghost" style="flex:1; border-color: #555; color: #555;" onclick="closeCompose()">ABORT</button>
        </div>
    </div>
</div>

<div class="top-bar">
    <span style="letter-spacing: 3px;">PEGASUS MAIL // SECURE_NODE</span>
    <div>
        <button id="compose-btn" onclick="openCompose()">NEW MESSAGE</button>
        <button class="btn-ghost" onclick="location.href='mhub.html'">EXIT</button>
    </div>
</div>

<div class="main">
    <div class="folder-sidebar">
        <div class="folder-item active" id="f-inbox" onclick="setFolder('inbox', this)">INBOX</div>
        <div class="folder-item" id="f-starred" onclick="setFolder('starred', this)">STARRED</div>
        <div class="folder-item" id="f-sent" onclick="setFolder('sent', this)">SENT</div>
        <div class="folder-item" id="f-deleted" onclick="setFolder('deleted', this)">DELETED</div>
    </div>

    <div class="inbox-sidebar" id="inbox-list"></div>

    <div class="content-area" id="mail-viewer">
        <div style="margin: auto; text-align: center; opacity: 0.2;">
            <h2 style="letter-spacing: 10px;">NO SELECTION</h2>
        </div>
    </div>
</div>

<script>
const S_URL = "https://zefaapnmutxgnabpxoog.supabase.co";
const S_KEY = "sb_publishable_zI-xgDNT8kQciUQ-j_EFsw_89a_CyGM";
const _supabase = supabase.createClient(S_URL, S_KEY);

const myID = localStorage.getItem('syntec_id') || "GUEST";
let myName = "UNKNOWN";
let currentFolder = 'inbox';

// Generic "System" mail placeholders
const boringMails = [
    { id: 999, sender_display_name: "HR-BOT", sender_name: "SYS", content: "REMINDER: Wipe Level-3 disinfectant on all surfaces.", created_at: new Date(Date.now()-86400000), is_starred: false, is_deleted: false },
    { id: 998, sender_display_name: "Facilities", sender_name: "FAC-01", content: "Coffee machine Sector 4 repair in 48h.", created_at: new Date(Date.now()-172800000), is_starred: false, is_deleted: false }
];

// --- Custom Notification Logic ---
function showTerminalNotify(text, isError = false) {
    const note = document.getElementById('terminal-notify');
    note.textContent = text;
    note.style.borderColor = isError ? "#f33" : "var(--neon)";
    note.style.color = isError ? "#f33" : "var(--neon)";
    note.style.display = "block";
    
    setTimeout(() => { note.style.display = "none"; }, 3500);
}

async function getProfile() {
    const { data } = await _supabase.from('profiles').select('first_name').eq('employee_id', myID).maybeSingle();
    if (data) myName = data.first_name;
}

function openCompose(target = "") {
    document.getElementById('mail-to').value = target;
    document.getElementById('mail-body').value = "";
    document.getElementById('compose-modal').style.display = 'flex';
}

function closeCompose() { document.getElementById('compose-modal').style.display = 'none'; }

async function sendMail() {
    const to = document.getElementById('mail-to').value.toUpperCase().trim();
    const body = document.getElementById('mail-body').value.trim();
    if (!to || !body) { showTerminalNotify("ERR: FIELDS CANNOT BE EMPTY", true); return; }

    const { error } = await _supabase.from('internal_messages').insert([{
        sender_name: myID, sender_display_name: myName, content: body, receiver_id: to
    }]);

    if (!error) {
        showTerminalNotify("TRANSMISSION SUCCESSFUL");
        closeCompose();
        if (currentFolder === 'sent') loadMail();
    } else {
        showTerminalNotify("TRANSMISSION FAILED: " + error.message, true);
    }
}

async function updateStatus(msgId, field, value) {
    if (msgId >= 998) { showTerminalNotify("ERR: SYSTEM RECORDS READ-ONLY", true); return; }
    
    const updateObj = {};
    updateObj[field] = value;
    
    const { error } = await _supabase.from('internal_messages').update(updateObj).eq('id', msgId);
    
    if (!error) {
        showTerminalNotify(`RECORD UPDATED: ${field.replace('is_', '').toUpperCase()}`);
        document.getElementById('mail-viewer').innerHTML = '<div style="margin: auto; text-align: center; opacity: 0.2;"><h2 style="letter-spacing: 10px;">REFRESHING...</h2></div>';
        loadMail();
    }
}

function setFolder(folder, el) {
    document.querySelectorAll('.folder-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    currentFolder = folder;
    loadMail();
}

async function loadMail() {
    const list = document.getElementById('inbox-list');
    list.innerHTML = '<div style="padding:20px; opacity:0.5;">DECRYPTING...</div>';
    
    let query = _supabase.from('internal_messages').select('*');

    if (currentFolder === 'inbox') {
        query = query.eq('receiver_id', myID).eq('is_deleted', false);
    } else if (currentFolder === 'starred') {
        query = query.eq('receiver_id', myID).eq('is_starred', true).eq('is_deleted', false);
    } else if (currentFolder === 'sent') {
        query = query.eq('sender_name', myID);
    } else if (currentFolder === 'deleted') {
        query = query.eq('receiver_id', myID).eq('is_deleted', true);
    }

    const { data } = await query.order('created_at', { ascending: false });
    let mails = data || [];
    if (currentFolder === 'inbox') mails = [...mails, ...boringMails];

    list.innerHTML = "";
    if (mails.length === 0) {
        list.innerHTML = '<div style="padding:20px; opacity:0.3;">NO RECORDS FOUND</div>';
    } else {
        mails.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'mail-item';
            div.onclick = () => viewMail(msg, div);
            div.innerHTML = `
                <span class="mail-sender">${msg.sender_display_name}</span>
                <div class="mail-preview">${msg.content}</div>
                ${msg.is_starred ? '<span class="star-indicator">★</span>' : ''}
            `;
            list.appendChild(div);
        });
    }
}

function viewMail(msg, element) {
    document.querySelectorAll('.mail-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');
    const viewer = document.getElementById('mail-viewer');
    
    const starLabel = msg.is_starred ? "UNSTAR" : "STAR";
    const deleteLabel = msg.is_deleted ? "RESTORE" : "DELETE";

    viewer.innerHTML = `
        <div class="email-header">
            <div><strong>FROM:</strong> ${msg.sender_display_name} (${msg.sender_name})</div>
            <div><strong>DATE:</strong> ${new Date(msg.created_at).toLocaleString()}</div>
        </div>
        <div class="email-body">${msg.content}</div>
        <div style="margin-top:40px; border-top:1px solid #222; padding-top:20px; display:flex; gap:10px;">
            <button class="btn-ghost" onclick="openCompose('${msg.sender_name}')">REPLY</button>
            <button class="btn-ghost" onclick="updateStatus(${msg.id}, 'is_starred', ${!msg.is_starred})">${starLabel}</button>
            <button class="btn-ghost" style="border-color:#f33; color:#f33;" onclick="updateStatus(${msg.id}, 'is_deleted', ${!msg.is_deleted})">${deleteLabel}</button>
        </div>
    `;
}

getProfile();
loadMail();
</script>
</body>
</html>
