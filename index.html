<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Syntec Terminal - Apple II</title>
<style>
body {
background-color: #0a0a0a;
color: #33ff33;
font-family: 'Courier New', Courier, monospace;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
overflow: hidden;
text-shadow: 0 0 5px #33ff33;
}

.crt-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
background-size: 100% 4px, 3px 100%;
pointer-events: none;
z-index: 10;
}

.screen {
width: 80%;
max-width: 800px;
height: 600px;
padding: 20px;
border: 2px solid #33ff33;
box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
position: relative;
background: #050505;
overflow-y: auto;
}

.input-area {
display: flex;
margin-top: 20px;
}

#command-line {
background: transparent;
border: none;
color: #33ff33;
font-family: inherit;
font-size: 1.2rem;
outline: none;
width: 100%;
}

.cursor {
display: inline-block;
width: 10px;
height: 1.2rem;
background: #33ff33;
animation: blink 0.8s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="crt-overlay"></div>

<div class="screen">
<div id="output">
<p>SYNTEC(TM) PEGASUS OS v2.0.1</p>
<p>COPYRIGHT 1986 SYNTEC LABS</p>
<p>---------------------------</p>
<p id="prompt">PLEASE LOG IN TO PROCEED...</p>
</div>

<div class="input-area">
<span id="input-label">LOGIN:&nbsp;</span>
<input type="text" id="command-line" autofocus autocomplete="off">
</div>
</div>

<script>
const input = document.getElementById('command-line');
const output = document.getElementById('output');
const label = document.getElementById('input-label');
const promptText = document.getElementById('prompt');

let stage = 0; // 0 = login, 1 = status report, 2 = flavor

input.addEventListener('keydown', function(e) {
if (e.key === 'Enter') {
const val = input.value.trim();
processInput(val);
input.value = '';
}
});

function addLine(text) {
const p = document.createElement('p');
p.textContent = text;
output.appendChild(p);
output.scrollTop = output.scrollHeight;
}

function processInput(cmd) {

switch(stage) {

// LOGIN STAGE
case 0:
if (cmd.toUpperCase() === 'W015' || cmd.toUpperCase() === 'J13') {
addLine("> ACCESS GRANTED");
stage = 1;
label.textContent = "";
addLine("> Status report");
} else {
addLine("> ERROR: INVALID CREDENTIALS");
}
break;

// STATUS REPORT STAGE
case 1:
if (cmd === "Theyre out of cream in the breakroom") {
addLine("> Regular or vanilla?");
stage = 2;
} else {
addLine("> invalid prompt");
}
break;

// FLAVOR STAGE
case 2:
const choice = cmd.toLowerCase();

if (choice === "hazelnut") {
addLine("> order confirmed");
setTimeout(() => window.location.href = "pegasus.html", 1000);
}
else if (choice === "peppermint") {
addLine("> order confirmed");
setTimeout(() => window.location.href = "863.html", 1000);
}
else if (choice === "vanilla") {
addLine("> invalid prompt");
}
else {
addLine("> invalid prompt");
}
break;

}
}
</script>

</body>
</html>
