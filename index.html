<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntec(TM) Terminal - Pegasus OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #33ff33; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-shadow: 0 0 5px #33ff33; }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10; }
        .screen { width: 80%; max-width: 800px; height: 600px; padding: 20px; border: 2px solid #33ff33; background: #050505; overflow-y: auto; position: relative; }
        .input-area { display: flex; margin-top: 20px; }
        #command-line { background: transparent; border: none; color: #33ff33; font-family: inherit; font-size: 1.2rem; outline: none; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body onclick="document.getElementById('command-line').focus()">
<div class="crt-overlay"></div>
<div class="screen">
    <div id="output">
        <p>SYNTEC(TM) PEGASUS OS v2.0.1</p>
        <p>COPYRIGHT 1976 SYNTEC LABS</p>
        <p>---------------------------</p>
        <p>PLEASE LOG IN TO PROCEED...</p>
    </div>
    <div class="input-area" id="input-zone">
        <span id="label">NAME:&nbsp;</span>
        <input type="text" id="command-line" autofocus autocomplete="off">
    </div>
</div>

<script>
const S_URL = "https://zefaapnmutxgnabpxoog.supabase.co";
const S_KEY = "sb_publishable_zI-xgDNT8kQciUQ-j_EFsw_89a_CyGM";
const _supabase = supabase.createClient(S_URL, S_KEY);

const input = document.getElementById('command-line');
const output = document.getElementById('output');
const label = document.getElementById('label');

let stage = "NAME"; 
let locked = false;
let sessionUser = { fname: "", byear: "", empID: "" };

async function typeLine(text, speed = 20) {
    return new Promise(resolve => {
        const p = document.createElement('p');
        output.appendChild(p);
        let i = 0;
        function type() {
            if (i < text.length) { p.textContent += text.charAt(i); i++; setTimeout(type, speed); }
            else { output.scrollTop = output.scrollHeight; resolve(); }
        }
        type();
    });
}

const delay = ms => new Promise(res => setTimeout(res, ms));

async function handleAuth(fname, byear) {
    locked = true;
    await typeLine("VERIFYING CREDENTIALS...", 40);
    
    try {
        const { data, error } = await _supabase.from('profiles').select('*').eq('first_name', fname.toUpperCase()).eq('year_of_birth', parseInt(byear)).maybeSingle();

        if (data) {
            await typeLine("IDENTITY VERIFIED. WELCOME BACK, " + data.employee_id, 30);
            sessionUser.empID = data.employee_id;
        } else {
            await typeLine("RECORD NOT FOUND. RETRIEVING APPLICATION DATA...", 50);
            await delay(1000);
            const newID = `${fname[0].toUpperCase()}${byear}-${Math.floor(100 + Math.random() * 900)}`;
            const { error: insError } = await _supabase.from('profiles').insert([{ first_name: fname.toUpperCase(), year_of_birth: parseInt(byear), employee_id: newID }]);
            if (insError) throw insError;
            await typeLine("YOUR APPLICATION WAS APPROVED BY _NELSON SYPHUS_. WELCOME TO SYNTEC.", 60);
            await typeLine("ASSIGNED ID: " + newID, 40);
            sessionUser.empID = newID;
        }

        await delay(1000);
        await typeLine("TERMINAL UNLOCKED. TYPE 'DIR' FOR DIRECTORY.", 30);
        stage = "COMMAND";
        label.textContent = "COMMAND: ";
        localStorage.setItem('syntec_id', sessionUser.empID);

    } catch (err) {
        await typeLine("CRITICAL ERROR: CONNECTION REFUSED.", 10);
        await delay(2000);
        location.reload();
    }
    locked = false;
}

input.addEventListener('keydown', async function(e) {
    if (e.key === 'Enter' && !locked) {
        const val = input.value.trim();
        if (!val) return;
        input.value = '';
        await typeLine("> " + val, 10);

        if (stage === "NAME") {
            sessionUser.fname = val;
            stage = "YEAR";
            label.textContent = "YEAR OF BIRTH: ";
        } 
        else if (stage === "YEAR") {
            if (!/^\d{4}$/.test(val)) { await typeLine("ERR: INVALID YEAR."); }
            else { await handleAuth(sessionUser.fname, val); }
        } 
        else if (stage === "COMMAND") {
            const cmd = val.toLowerCase();
            if (cmd === "dir") {
                await typeLine("--- SYSTEM DIRECTORY ---", 20);
                await typeLine("> CLINICAL - INTERN EVALUATION", 20);
                await typeLine("> HUB      - PERSONNEL COMMUNICATIONS", 20);
            } else if (cmd === "hub") {
                await typeLine("OPENING SECURE CHANNEL...", 40);
                await delay(1000);
                window.location.href = "mhub.html";
            } else if (cmd === "clinical") {
                await typeLine("ACCESSING CLINICAL DATABASE...", 40);
                window.location.href = "clinical-practice.html";
            } else {
                await typeLine("INVALID PROMPT", 20);
            }
        }
    }
});
</script>
</body>
</html>
