<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syntec Terminal - Apple II </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #33ff33;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
            linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .screen {
            width: 80%;
            max-width: 800px;
            height: 600px;
            padding: 20px;
            border: 2px solid #33ff33;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            background: #050505;
            overflow-y: auto;
            position: relative;
            cursor: text;
        }

        #output p { margin: 5px 0; line-height: 1.2; }

        .input-area {
            display: flex;
            margin-top: 20px;
        }

        #command-line {
            background: transparent;
            border: none;
            color: #33ff33;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>

<body onclick="document.getElementById('command-line').focus()">

<div class="crt-overlay"></div>

<div class="screen">
    <div id="output">
        <p>SYNTEC(TM) PEGASUS OS v2.0.1</p>
        <p>COPYRIGHT 1986 SYNTEC LABS</p>
        <p>---------------------------</p>
        <p>PLEASE ENTER FIRST NAME TO BEGIN APPLICATION...</p>
    </div>

    <div class="input-area" id="input-zone">
        <span id="label">NAME:&nbsp;</span>
        <input type="text" id="command-line" autofocus autocomplete="off">
    </div>
</div>

<script>
// UPDATED WITH YOUR NEW CREDENTIALS
const S_URL = "https://zefaapnmutxgnabpxoog.supabase.co";
const S_KEY = "sb_publishable_zI-xgDNT8kQciUQ-j_EFsw_89a_CyGM";
const _supabase = supabase.createClient(S_URL, S_KEY);

const input = document.getElementById('command-line');
const output = document.getElementById('output');
const label = document.getElementById('label');
const inputZone = document.getElementById('input-zone');

let stage = 0; 
let locked = false;
let tempName = "";

function typeLine(text, speed = 20) {
    return new Promise(resolve => {
        const p = document.createElement('p');
        output.appendChild(p);
        let i = 0;
        function type() {
            if (i < text.length) {
                p.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                output.scrollTop = output.scrollHeight;
                resolve();
            }
        }
        type();
    });
}

const delay = ms => new Promise(res => setTimeout(res, ms));

async function processAuth(fname, byear) {
    locked = true;
    inputZone.style.display = "none";
    await typeLine("UPLINKING TO SYNTEC SERVERS...", 40);
    
    try {
        // Search for existing profile
        const { data, error } = await _supabase
            .from('profiles')
            .select('*')
            .eq('first_name', fname.toUpperCase())
            .eq('year_of_birth', parseInt(byear))
            .maybeSingle();

        if (data) {
            await typeLine("IDENTITY VERIFIED. ACCESS GRANTED.", 30);
            localStorage.setItem('syntec_id', data.employee_id);
        } else {
            await typeLine("NO RECORD FOUND. EVALUATING APPLICATION...", 50);
            await delay(1000);
            
            const newID = `${fname[0].toUpperCase()}${byear}-${Math.floor(100 + Math.random() * 900)}`;
            
            const { error: insError } = await _supabase
                .from('profiles')
                .insert([{ 
                    first_name: fname.toUpperCase(), 
                    year_of_birth: parseInt(byear), 
                    employee_id: newID 
                }]);

            if (insError) throw insError;

            await typeLine("STATUS: APPLICATION APPROVED.", 60);
            await typeLine("WELCOME TO SYNTEC. YOUR ID IS: " + newID, 40);
            localStorage.setItem('syntec_id', newID);
        }

        await delay(1500);
        await typeLine("REDIRECTING TO ACCOUNT HUB...", 20);
        await delay(1000);
        window.location.href = "mhub.html";

    } catch (err) {
        console.error("Supabase Error:", err);
        await typeLine("CRITICAL ERROR: CONNECTION REJECTED.", 10);
        await typeLine("CHECK DATABASE RLS POLICIES.", 10);
        await delay(3000);
        location.reload(); 
    }
}

input.addEventListener('keydown', async function(e) {
    if (e.key === 'Enter' && !locked) {
        const val = input.value.trim();
        if (!val) return;

        input.value = '';
        await typeLine("> " + val, 10);

        if (stage === 0) {
            tempName = val;
            stage = 1;
            label.textContent = "YEAR OF BIRTH: ";
        } else if (stage === 1) {
            if (!/^\d{4}$/.test(val)) {
                await typeLine("ERROR: PLEASE ENTER A 4-DIGIT YEAR.", 20);
            } else {
                await processAuth(tempName, val);
            }
        }
    }
});
</script>
</body>
</html>
